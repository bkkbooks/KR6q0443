日問傑如何是正法眼傑遽答曰破沙盆師頷之付偈曰佛用眼睹星我用耳聽聲我用與佛用我明汝亦明掇不去兮拈不來風吹日炙賺人猜當陽觸瞎娘生眼獨露堂堂遍九垓臨濟第十四世明州天童山密菴成傑禪師住烏巨破菴先參師命典客一日師偶對僧舉不是風動不是幡動先聞豁然大悟次日師遇先衆寮前問你總不得作伎倆試露個消息看先應聲曰方丈裡有客師呵呵大笑先侍師凡五載盡得旨要後辭歸蜀師以偈送之曰萬里南來川藞苴奔流度刃扣玄關頂門戳瞎金剛眼去住還同珠走盤付法偈曰佛與衆生見元本不隔線付法付自心非見非不見不是風兮不是幡平生底蘊盡掀翻要津把住通消息度刃奔流始徹源臨濟第十五世夔州府臥龍破菴祖先禪師住蘇之西華秀峰有僧入室師打逐至法堂時無準範解曰禪和家爭禪亦常事耳師曰豈不聞道我肚饑聞板聲要喫飯去聻準聞不覺汗流浹背師居靈隱準復從一日侍游石筍菴菴有道者請益曰胡孫子捉不住乞師方便師曰用捉他作麼如風吹水自然成紋準在旁大徹付偈曰我若不見時汝應不見見見見非自心自心常顯現江南三月趁春風兩岸桃花映水紅欲識渠儂真面目鷓鴣啼在緑陰中臨濟第十六世徑山無準師範禪師賜號佛鑑斷橋倫祖在會下準以狗子因何有業識令祖下語凡三十轉不契祖云可無方便乎準舉真淨頌曰言有業識在誰云意不深海枯終見底人死不知心祖竦然良久忽聞板聲通身汗下於是脫然準以從上源流并付法偈曰真理直如絃何默更何言我今善付囑表心本無得祖出世祗園遷天台瑞岩國清準于淳祐己酉三月十五示疾集衆遺囑其徒衆請偈準乃執筆書偈云來時空索索去也赤條條更要問端的天台有石橋養子之緣意自深海枯人死要知心板聲一擊通身脫迥出天台亙古今臨濟第十七世杭州淨慈斷橋妙倫禪師台州徐氏子室中嘗舉萬法歸一示徒日隨衆務方山寶侍次師以莧菜根示之寶悟入師付法偈曰本無迷悟人迷悟自家討記得少壯時而今不覺老即繼師席莧根拈起骨毛寒好肉無端索灸瘢悟得單傳真祕訣風前總是活人丹臨濟第十八世天台瑞岩方山寶禪師初住西庵無見參師雖有所契未臻其極遂築室華頂精苦自勵一日作務次渙然有省平生凝滯當下冰釋遂走瑞岩呈所解方以偈證曰道人得得出山來盡把襟懷對我開坦坦平平如鏡面澄澄湛湛絶纖埃忽然得個轉身句衲卷寒雲便歸去萬八千丈華頂峰一笑裂開鐵面具家山到後絶思惟拗折烏藤拄竹扉糞火堆中消息好芋香便是道香時并付法偈曰此心極廣大虛空比不得此道只如是受持休外覓一鑑當天照影寒瀑飛深處展眉端虛空絶巘情難比分付清風直下看臨濟第十九世天台無見先睹禪師一坐華頂四十餘年足未嘗輒越戶至正賜號妙明真覺白雲度深習禪定後一策南遊遍叩禪林無有可其意者聞師說法天台欣然就謁師見器之充侍者度問西來密意未審如何師云待娑羅峰點頭即向汝道度以手搖曳擬答師便喝度云娑羅峰頂白浪滔天花開芒種後葉落立秋前師云我家無殘羹剩飯也度云此非殘羹剩飯而何師頷之付法偈曰至大是此心至聖是此法燈燈光不差了此心者達虎嘯龍驤山勢險西來密意灼然酬殘羹剩飯都掀卻百億須彌笑點頭臨濟第二十世處州福林白雲智度禪師初住普慈諸剎洪武己酉應召尋隱福林平昔機語不容人録古拙俊侍師室中了明大事深契牧牛之作乃付法偈曰心中有自心法中有至法我今可付囑心法無心法幃幄坐籌聲價重不容裨販出常情其中有個真消息戴角披毛異類行臨濟第二十一世太平府繁昌八峰山古拙俊禪師無際參師問還我照用來際云若有照用即成障礙師云這廝著空佛也救不得際云有無俱寂滅空佛悉皆非後示以偈云憶昔繁昌一別時此心能有幾人知無絃曲子真堪續慧命懸懸付阿誰付法偈曰一道不心光三際十方明何于明白中有明有不明年老婆心徹底祜翻雲覆雨驗淆訛繁昌嫡脈今猶在空佛俱非唱哩囉臨濟第二十二世川東普州道林無際悟禪師別號蠶骨蜀中人也年二十出纏縛竹為菴研勵無懈四指大書帖亦不顧只是拍盲做鈍工夫後得大徹大悟即呈本師偈云寂照無上下光明處處通本來無皂白無處不含容正統九年應召說法上大悅師嘗以無字公案示徒月溪澄久依座下深得奧旨特書月溪二字法語示之并付法偈云我無法可付汝無心可受無付無受心何人不成就慣將無字立關樞殺活縱橫似太呵一段寒輝親入手等閒拈出斬癡魔臨濟第二十三世南京大岡月溪澄禪師景泰三年敕賜回大岡號慈善一日室中出祖衣示徒乃云此衣是唐朝宮主所置今八百餘年矣祖祖相傳至東普先師普付與老僧若是克家種子方堪紹荷狐假虎威焉敢希冀又云如百丈侍馬祖祖侍南嶽嶽侍曹溪六祖皆久久親炙磨光銼鋭乃能豁徹重關羈鎖掃盡微見窠臼深得大機大用可為人天眼目耳師居嘗凡見僧請益乃云佛法不是鮮魚怕爛卻那即趁出夷峰寧侍傍忽悟入師付衣法偈云心即能知心法即可知法今所付法心非心亦非法授受僧伽古至今克家方許示叢林幸然不是鮮魚物留得宗風不墜針臨濟第二十四世大岡夷峰寧禪師寶芳住天目往參師器之乃付法偈云祖祖無法付人人本自有汝受無付法急著傳於後大地山河驀入官松風水月不相瞞滔滔只要源頭活何慮人間滄海乾臨濟第二十五世天目寶芳進禪師示衆云拈花微笑節外生枝面壁安心畫蛇添足山僧這裡無禪可參無道可學直教一個個成佛作祖去汝等還信得及麼良久拍膝云劍號巨闕玉出崑岡付野翁曉法偈云真性本無性真法本無法了知無法性何處不通達好兒終不使爺錢便把家私徹底掀無限風光遮不住東西南北有知恩臨濟第二十六世嘉興東塔野翁曉禪師無趣參每呈見解師盡與掃闢昔日所負直使索然一日師謂趣云我有一言要與爾說趣便問師但笑而不語趣又問師又笑趣不諳旨遂禮拜懇求師不得已乃云達磨西來直指人心見性成佛唯在直下體取子若信得及可放下萬緣參個萬法歸一趣領旨後聞雞鳴有省即剃染師乃付法偈云非法非非法非性非非性非心非非心付汝心法竟舌頭無骨覓知音笑裡藏刀意更深直使萬緣俱放下雞鳴方契祖師心臨濟第二十七世嘉興敬畏無趣如空禪師無幻參師誨以教外別傳之旨朝夕參究有所契入遂剃染結庵徑山集無趣語録往見趣趣問子向在甚麼處幻曰徑山趣曰做得甚麼事幻曰某甲買得一段田收得原本契書請和尚僉抑即將集本呈上趣接得展看曰者個是我的汝的聻幻曰和尚莫搶奪行市趣便擲下集本幻便出復呈偈趣曰非語言文字也是汝作底麼幻曰某甲鼓粥飯氣若謂有所得辜負和尚不少趣乃點首即付法偈云師傳拈花宗示我微笑法親手展付汝持奉遍塵剎重重勘問別親疏號段分明總不孤點首契書收拾起不愁田地致荒蕪臨濟第二十八世徑山無幻性沖禪師初住車溪後開法徑山示衆云老漢本擬深藏鄉僻遣過生緣爭奈無趣老人有不了底公案山僧出來與他了卻僧問如何是無趣老人不了底公案師便打僧云某甲有甚過師云殃及兒孫南明掩關興善師至關前勘問南將前工夫舉似師跌足云悔我來遲向後總欲到此不易得也南即啓關往謁于車溪徑山服勤八載一日於地上拾片紙有觀方知彼去去者不至方之句有省呈無幻幻乃印可即命充首座付法偈曰得本無所得傳亦無可傳今付無傳法東西共一天塔于徑山扣關跌足不無胎刻骨銘心去復來八載途中親薦得寒梅偏向雪中開臨濟第二十九世興善南明慧廣禪師徑山示衆云五峰頭卓朔雙徑尾顛先喝石嵒一任𨁝跳明月池覆地傾天此四句中有一句有殺人刀無活人劍有一句有活人劍無殺人刀有一句殺人刀活人劍俱有有一句殺人刀活人劍俱無伶俐衲僧檢點得倜儻分明許你一生參學事畢普明鴛湖初謁無幻于車溪開示禪要後侍南明于徑山一日閲思益梵天經有省即呈無生偈曰鐵壁銀山誰敢摧賊身驀地拶將來相看元是舊相識當下慚惶笑臉開又曰歷劫多年窮苦事風光流得到今朝笙歌車馬門如市內院依然鎖寂寥南閲之痛加呵斥更不作偈頌南後掩關皋亭諸處不離左右一十三載值南病篤一日舉香嚴獨腳頌問明明才開口南便喝明復擬開口南又喝明方點首南即付法偈云無傳無受法無傳無受心付與無手者掣斷虛空斤啐啄同時血也枯命根不斷奈伊何特然啄破琉璃殼別有超宗異目多臨濟第三十世建寧普明玄微妙用禪師別號鴛湖初住嘉興白苧普明寺及桐月庵介菴進往參師即垂誨便有師資之契菴因臥疾忽聞匠斧斫大木聲有省即呈萬如和尚萬頷之後聞師住建寧普明及侍萬入山請師升座扣問師云不須更問山中事觀見容顏便得知菴便禮拜未幾辭往曹山再參師於普明即命入室菴方跨門師云是甚麼菴擬答師震威便喝菴豁然契悟即掩耳而出一日師缺安菴侍次師命茶問云汝字覺先喚甚麼作先菴云且喜今日得自在師云如何是覺後菴云請和尚尊重師云你還分得先後麼菴良久師便喝菴云某甲只管喫茶師云如何是喫茶底事菴云柿棗腐乾都在這裡師云你作麼生菴云卻被某甲一口食盡師云滋味如何菴云甜者自甜鹹者自鹹師云未在更道菴云某甲謝茶便禮拜師深喜之又一日師集衆乃舉拂子云世尊拈一枝花老僧舉一枝拂且道是同是別菴出禮三拜歸位師云這瞎驢遂擲下即出從上源流衣拂并書法偈付云沿流一段事竟無頭與尾付與師子兒哮吼滿大地師于崇禎壬午十月十一日說偈而化嗣法者三人菴出世嘉興金明寺頌曰舊債思酬驀擲竿電光石火逼人寒死骷髏上開活眼拋出當陽一任看冷灰豆爆忽抬眸薄暮晴空月一鉤長嘯一聲天地動不風流處也風流
