body:
  text: 嗣法門人真在真覺真性真本編疏引募修金明寺緣起金明乃宋佛慈禪師道場繼有賜紫淨惠大師鼎建千佛寶閣開禧賜額至明成化間得祖昭大師重新迄今又二百餘年矣余於戊子仲夏赴諸檀護之請卓錫此地亦不免理廢席於榛莽整頽綱於荒陋時有僧擬充修造事余但以古德住院偈止之已經十三載惟清冷逼人禪侶往來鮮能措足比見山門愈圮堂閣愈危得無坐視之責乎今蒙諸大護法矢心以修葺見示余不得不拈出以告衆善信伏祈協力共襄福有攸歸偈曰海月湖天境自寬危堂破閣逼人寒要新此個舊公案信手揮來直下看乞修造偈引隱川大慈庵乃金明寺之故地去濮溪二里許有勝山居之況新篁環翠細柳垂陰近構堂宇數椽其奈臥房未備有失往來禪侶之接今岩輪二上座遠從匡廬至此掛笠數月且不嫌荒僻堅請歷事觀其志可謂為法忘形也余不能固辭特以舉似檀那惟欣然捉筆揮出家珍作不朽之勝因則福果烏可涯量哉更述一偈草年不打這鼓笛今朝特地一翻新知音自肯傾心和韻腳分明十一真大乘庵募重裝佛像偈引慧上人請刻雕成衆相聚沙為佛塔無為真佛實在我身由是觀之老瞿曇慈悲之故葛藤太煞余又如何引蔓牽枝耶偈曰小乘錢貫大乘井索要須聖相重輝必請高檀注腳普明修造引妙峰素穎長老請建寧普明山寺乃我先老人養育賢才陶鑄聖凡之所其層巒擁翠萬脈歸宗南北往來鮮有不至者豫自癸未春出山屈指於今一十七白矣屢欲慰安衆望無奈蠡湖破院兼病體羸尪未遑跋涉溪山因循歲久以致妙峰素公深憂古道垂秋叢林凋落特與普明知事相商不辭數千里杖笠來迎過嶺共整陳綱繼起祖席亦足知其為法門師弟之誼至矣然病朽愧不能入山又烏忍安坐付傾倒於弗聞耶凡我同志力挽頽風普明有賴其中更有一段光彩劫外風流試問取妙峰定為道破順治己亥孟冬下浣七日檇李金明介菴進朽題齊單陶朱富而有餘金明貧之不足說甚雲門餅趙州茶一味五味管取無下口處而今不妨更拈草料細切清風一任橫吞豎咬忽得嚼著些些定見千佛閣頓生光彩檇李亭重整規模人人慶贊皇圖處處莊嚴佛土大衆莫道空疏伏唯珍重敬畏庵緣起嘉禾范蠡湖西有敬畏庵乃我祖無趣老人隱居道場也創自明之嘉靖間其來百餘年矣緣老人俗姓施里中多稱施庵云庭旁有大槎槤樹老人嘗與徑山無幻祖說法其下有陸五臺諸公訪道參扣老人寂後即塔本庵庵中疏竹清池佛室數楹後有見如徹師啓建樓宇崇禎戊辰歲徹孫日明輪公繼擴中樓徹師係老人外孫老人外孫五徹師行四長為沈鶴齊公即護法羅仲吳居士外翁也居士於構中樓時曾助輪公緣就自鼎革以來頓覺頽圮余住金明去庵不數武常過禮塔目擊心憂茲日明公擬完夙願同余弟子羅子先持冊乞數語引導衆信蓋子先乃仲吳居士之子輪公不忘舊護故偕之來余合掌加額遂述緣起以告檀那共襄勝舉俾古佛道場復見一新其福德又烏可涯量哉凡樂助者點筆於後勒石以垂不朽焉化齊米疏無能乞釜甑生塵法從緣起鉢盂啓口道在人弘展布袋於十字街頭露肝膽於三家村裏固廩打開管取人人具足堅囊頓破直教個個周旋化亦真施亦真籬根香擁菊花新食輪轉法輪轉風吹落葉兩三片時當九日捉筆欣然大力檀那快心樂助化燈油引紙撚無油通人委悉空谷有神達者方知若向無油處著眼管取騰今耀古能於有神中展手直教赫地輝天搕𢶍頭顯發無始威光漆桶裏露出本來面目舉似高檀快然傾倒序跋源流頌序佛祖密室中有一段因緣從來無人覷著何故覷著則瞎秪如臨濟興化父子授受源流有據諸方但以化得三聖大覺力而拈臨濟香更有謂臨濟不傳興化而化在三聖大覺處悟得先師喫棒底道理後拈香臨濟蓋僭嗣也若此妄鑿古人何異矮子觀場今諸子云從上佛祖皆見有付法偈既已刊出燈録何至馬祖下不刊亦復不見法偈為是無付為復珍惜不彰咄黃河三千年一度清汝等冬瓜茄子見個什麼雖然憫子誠懇不得已即將佛佛授手祖祖相傳源流法偈機語隨緣頌出輒成一帙敢以公諸天下萬世明眼報佛深恩知佛祖授受之有的據益俾德勝無焚衣之悔耳還見正法眼藏麼一隻破草鞋無底亦無對鴛湖和尚頌古序從上慧命源源如線而出車溪尤甚一絲懸於九鼎幸我老人一肩擔荷密用潛行於水邊林下二十餘年隱顯以時罕逢識者崇禎乙亥春有嚴𨍏轢居士參師殷殷不下便乃復白苧普明廢址懇請以居及郡紳士咸迫師以病堅辭不得已勉赴插草開荒率衆住靜不期丙子秋因事挈杖入閩後之住院開法亦號普明正如杲日麗天無有所不燭也嘗謂余曰老僧和牧牛并諸頌古子看何如答曰情知老人向異類中行師曰如何異類中行事余便兩手拓地再拜而出今復閲普明遺稿牧牛諸頌大有不同處如何是我老人不同處聻謹輯此刻以俟賢者跋無趣和尚真蹟丁亥秋抄余過敬畏庵禮吾無趣祖塔次有孫喻微忽出殘紙一幅相似余捧讀之是趣祖親書示龍湖先生法語不覺欣喜乃云祖師真蹟若優曇花實為希有今既見者宜珍藏之喻微云見此一篇即見祖師面目矣咄哉癡子祖師面目安在紙上耶既不在紙上且道祖師面目又在何處吁袈裟零落難縫補收捲雲霞自剪裁隱川集自敘壬辰秋余同卜右文居士抵濮溪道經村落訝其遍地荒蕪狐兔陵食星散農家俱困緩惰至於禽無巢卵樹乏斧柯縱使神農之化亦難矣士乃指片地云此金明贅疣也余目之曰噫此地只少一椽耳是冬卜右文羅子先二居士同衆信捐資購地別創一廬於川上余名曰大慈庵蓋取濟度此方之義示耕數載頗與彼生息迥別農人皆異之雖大義茫然乃有稚子傍桑陰學種瓜之意但覺狐兔潛藏桑苗蔥鬱悠悠乎風清月霽於三間茆下落落乎鳥啼花笑於千頃畬頭余時啜白湯烹野藿吟詠其間庶不孤村居之幽況矣爰述數語以揭初因并志諸護之竭心焉跋子蕃朱居士寶夢記未到這裏直須疑著既到這裏切忌住卻若恁麼會與寶夢記轉不恁麼會亦與寶夢記轉舉似明眼請下一語看跋南明和尚語録法門陵替甚矣按萬曆間宗師家頗尚孤峻遞相隱謝此一變也逮天啓時方有人出法門似覺可觀至鼎革來十餘載泛濫彌漫此又一變也蓋翁于泰昌改元遷化其操履卓倫非今時可擬閲是録者當具別眼法門有望焉針銘即事偶針無上妙道不落言詮真妄雙泯直指單傳或棒或喝非教非禪了達知見勿談要玄和光同塵有實有權無罣無礙任運翛然獨超物外迥出劫前巍巍堂堂闊步大千風清月白別是一天大慈佛法博飯栽田葛藤剷斷弗扯章篇初調犢子驀鼻繩穿或犯苗稼時猛加鞭純乎哮吼放浪林泉紹隆佛祖惟在志堅千鈞重擔努力一肩主持門戶赤手空拳無量妙義一一重宣中道不立那有偏圓一金鎔出叉釧瓶鈿橫拈倒用信手自便懶殘風味石枕高眠日上月下何故周旋體性圓明電拂聖賢迷真逐妄誠可悲憐貧窮學道淤泥出蓮生死呼吸何論少年耽著五欲業覆情牽渠無能所寧有蓋纏須知端的山邊水邊誅茆伐竹聊構數椽或問如何誰曰隱川不局命運豈逐世緣騰蛇改格枯淡自全若為知己芳草芊芊牙銘我年剛五十牙生四十五爾以我固堅我以爾利腑嚼斷玉石根喫盡鹹酸苦無爾不相和無我不吞吐齊密且關風深隱自回互今者脫然離我何忍其土哀哉銘爾衾日輪正當午眼鏡銘昏之以明明之以昏惟爾其精莫知其神獅子玉章銘獅子牙爪琢出崑岡踞地哮吼驚走狐狼雖無一字文彩難藏印住印破隱川之章誰能任重惟爾用光玉魚銘美質無瑕深藏峙屺誰琢誰磨徹頭徹尾平地波濤潑天風雨慎勿輕躍善為珍體佛牙匱銘廣若姚居士請無上慈尊從地湧出微塵界中放光現瑞直示群迷廣宣妙義世所希有凡聖叵測若能見聞殊勝福利擁護是幢賴斯名器佛事為徑山曇周師火師以火炬指龕召衆云還見曇周師落處麼脫或未然今日進上座為伊點出去也良久云叢林輔弼已經年一旦相傾五老前山岌岌水潺潺昨夜三更月正圓擲炬云優曇花發火中鮮為敬畏庵蓮禪人掩龕師以拄杖擊龕一下云生耶不道雲斷寒猿啼古路又擊一下云死耶不道林殘羸鶴唳空巢喻微蓮公於斯會得白日傳心靜青蓮喻法微其或未然金明為汝說破遂掩上云樹頭黃葉落且向此中看復擊一下又火舉火炬云生死關頭絶要津西風切切送歸人急須火裏翻身去一朵青蓮劫外春遂投火炬為萬福庵法林上座火師云圓公圓公汝當時在我室中有一則公案有權有實有照有用爭奈末後未圓汝還記得麼金明今日為汝當衆拈出良久云明明不覆藏明明絶回互生死與去來杲杲日輪午若也圓得定然不向別處流轉脫或未然我今為汝圓卻且道作麼生圓百草頭邊光燦爛更嫌何處不風流遂擲火炬云燒為母賀氏孺人掩棺師至棺前作女人拜顧視左右云還見我老母麼若謂此便是此乃父母精血所成終歸敗壞且道我老母在什麼處復高聲召云老母老母放下著即以手掩上起棺師以拄杖擊棺三下云來時不增去時不減此土西方不隔一線若然凝滯體亦難見惟我老母信行自便且如何得自便聻遂以杖引之而出掩土師撮土召云老母離塵合覺離覺合塵今日離合且置秪如歸根得旨一句作麼生剷開荒草地遍界藕花香以土掩之為張恆所居士掩龕師云生也恁麼死也恁麼生死去來了無干涉脫或不然金明為汝下手去也遂掩上云坐斷千差路從教五眼窺喝一喝為柏山素弘理長老起龕師以杖擊龕云橫身異類于西子湖頭赤骨婆心于柏山寺裏三十年來忠孝驗在目前百千載去恩怨且看腳下將謂你完我誰知我完你且止更有一著汝等還見麼卓一卓云步步著力便起舉火師舉炬云起廢席整頽綱素位而行建法幢立宗旨恢弘祖道只如事理圓融徹骨徹髓一句又作麼生迸出通身三昧火為人不顧兩莖毛遂攛下入塔師至塔前以杖指骨云大衆這是你本山堂頭和尚一生受用不盡底今日入此殊勝光明幢中輝天鑒地無黨無偏且道全身奉重又如何豎起拄杖云巍然一塔黃金骨直矗青霄萬壑垂喝一喝便放下為太倉宦陳修長老封龕師至龕前卓拄杖云古塘插草運大悲手於未萌繡雪開山努摩醯眼於末季今雖能事已畢尚有公案未了以致老僧不惜眉毛要問汝大衆還知伊不了處麼良久云問取我孫澄首座便封為敬畏庵日明耆舊火平野監院請師舉炬云林泉落莫正斯時黃葉紛紜滿路岐聚散不知情自戚槎槤歲歲露霜枝這是吾祖無趣老人受用不盡處幸我日明耆宿固守一生適來遽爾長往金明無可薦揚惟贈一星猛火便攛下為得中知客火師舉炬云會麼赤日炎炎萬里無雲薰風煜煜青天有過去此二途中道不立且道別資一路又作麼生山僧為汝下個注腳遂攛下云燒為本智上人火師舉炬云全愚不愚本智非智或喜或瞋如幻如寄邏齊供衆十二年終日街坊耍兒戲一朝拾得草鞋錢撒手呵呵便歸去大衆且道他歸何處遂擲炬云急著眼覷曹繼宗請為郁氏全玉掩棺師以杖擊棺云全玉二十年前取名二十年後入殮汝心念佛已切佛令汝心已清忽得前後際斷撒手歸家心佛一如無非極樂雖然更須知藏身處沒蹤跡沒蹤跡處莫藏身還會麼臘雪未融千澗水春風又發萬山花復擊三下為張居士火師以杖擊棺云寒雲楚楚生也一棒寒色凄凄死也一棒惜乎爾兄可悲可痛五十二年一場春夢今日到此還醒也未若也醒得紅塵堆裏一任逍遙荒草溪