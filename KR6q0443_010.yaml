白耳鞠多曰我身十七非性十七也祖知是法器經三載以法眼付囑之付法偈曰非法亦非心無心亦無法說是心法時是法非心法問南酬北露英才口款相隨缺一鎚三載巾瓶無別囑與師把手上高臺四祖優波鞠多尊者在世化導證果最多最後有一長者子名曰香衆禮祖求出家祖問曰汝心出家身出家答曰我來出家非為身心尊者曰不為身心復誰出家答曰夫出家者無我我故無我我故即心不生滅心不生滅即是常道諸佛亦常心非形相其體亦然祖曰汝當大悟心自通達宜依佛法僧紹隆聖種因為剃度授具名提多迦且告之曰昔如來以正法眼藏次第傳授以至于我今復付汝付法偈曰心自本來心本心非有法有法有本心非心非本法獅子全威便出群吼聲未許等閒聞堂堂聖種真堪紹次第傳流非世勳五祖提多迦尊者行化中印度彼有仙名彌遮迦昔與祖同生梵天遮迦遇阿私陀仙授之仙法祖則修習禪那報分已經六劫以夙緣故捨邪歸正率衆求解脫祖即度之其衆亦一時發心祖以法眼付彌遮迦而說偈曰通達本法心無法無非法悟了同未悟無心亦無法一念才分萬劫殊剎那回步便同途雖能逐日追風疾狼藉春光不較多六祖彌遮迦尊者遊化至北天竺國於闤闠間遇一人手持酒器逆祖問曰師何方來欲往何所祖曰從自心來欲往無處曰識我手中物否祖曰此是觸器而負淨者曰師識我否祖曰我即不識識即非我彼即置器禮祖自稱名婆須密願加度脫祖與剃度付法偈曰無心無可得說得不名法若了心非心始解心心法趁性顛狂笑傲頻茫茫誰識甕頭春攔街撞著剛知己共醉桃源好避秦七祖婆須密尊者常服淨衣執酒器遊行里閈或吟或嘯人謂之狂遇六祖彌遮迦受法行化至迦摩羅國有智者佛陀難提索祖論義祖曰仁者論即不義義即不論若擬論義終非義論難提知祖義勝心即欽服祖說付法偈曰心同虛空界示等虛空法證得虛空時無是無非法額有圓珠長七尺特來呈伎徹光輝當機直示虛空法拶入虛空絶是非八祖佛陀難提尊者適提伽國毗舍羅長者家長者作禮問何所須祖曰我求侍者長者曰我有一子名伏馱密多年已五十口未曾言足未曾履祖曰如汝所說真吾弟子伏馱聞之遽起禮拜而說偈曰父母非我親誰是最親者諸佛非我道誰是最道者祖以偈答曰汝言與心親父母非可比汝行與道合諸佛心即是外求有相佛與汝不相似欲識汝本心非合亦非離伏馱聞偈便行七步隨祖出家付法偈曰虛空無內外心法亦如此若了虛空故是達真如理五十年來口不開鵝王擇乳亦奇哉剛行七步揚家醜引得兒孫入禍胎九祖伏馱密多尊者受八祖付囑至中印度有長者香蓋攜一子名難生禮祖曰曾有一仙謂此兒骨相非常當為法器今命出家祖與剃髮付戒羯磨之際祥光燭座舍利現前自此精進忘疲未幾祖付法焉偈曰真理本無名因名顯真理受得真實法非真亦非僞才舉金刀頂相圓祥光遍布耀人天分明舍利人難睹一領袈裟搭半肩十祖脅尊者本名難生投九祖執侍左右脅不至席因號脅尊者至華氏國憩一樹下有長者子名富那夜奢合掌前立祖問曰汝從何來答曰我心非往祖曰汝何處住答曰我心非止祖曰汝不定耶曰諸佛亦然祖曰汝非諸佛曰諸佛亦非祖乃付法說偈曰真體自然真因真說有理領得真真法無行亦非止夙債來償自古衣不投機處卻投機其中一語誰相諳夜半金烏撲地飛十一祖富那夜奢尊者得法脅尊者尋詣波羅奈國彼有馬鳴大士作禮問曰我欲識佛何者即是祖曰汝欲識佛不識者是曰佛既不識焉知是乎祖曰既不識佛焉知不是曰此是鋸義祖曰彼是木義祖問鋸義者何曰與師平出馬鳴卻問木義者何祖曰汝被我解馬鳴豁然省悟付法偈曰迷悟如隱顯明暗不相離今付隱顯法非一亦非二拖來拽去絶遮藏木義解開汗似湯突出本來非二一薰風拂拂透身涼十二祖馬鳴尊者于華氏國宣化俄有魔來與祖較力祖震伏之魔遂現形懺悔祖問汝名誰耶眷屬多少曰我名迦毗摩羅眷屬三千祖曰盡汝神力變化若何曰我化巨海極為小事祖曰汝化性海得否曰何為性海我未嘗知祖曰山河大地皆依建立三昧六通由茲發現迦毗聞已遂發信心付法偈曰隱顯即本法明暗元不二今付悟了法非取亦非離三千業力逞神奇性海揚波總不知無量法門由此立盲龜值木幾人思十三祖迦毗摩羅尊者入西印度北山之中山有大樹蔭覆五百大龍其樹王名龍樹常為龍衆說法祖訪之龍樹出迎曰深山孤寂龍蟒所居大德至尊何枉神足祖曰吾非至尊來訪賢者龍樹默念曰此師得決定性明道眼否是大聖繼真乘否祖曰汝雖心語我已意知但辦出家何慮吾之不聖龍樹聞已悔謝祖度付法偈曰非隱非顯法說是真實際悟此隱顯法非愚亦非智意知心語顯真乘滄溟由來鯤化鵬但辦肯心承聖業法中何慮冷如冰十四祖龍樹尊者至南印度導化時有迦那提婆來謁將及門祖先遣侍者以滿鉢水置于座前提婆見之即以一鉞投之而進祖後造智度等論垂世以法眼付提婆付法偈曰為明隱顯法方說解脫理於法心不證無瞋亦無喜陷虎之機不易親當陽拈出便通津針投水乳風前禍爛熳山花別問春十五祖迦那提婆尊者從龍樹祖得法後至迦毗羅國彼有長者梵摩淨德以其子羅睺羅多隨祖出家祖曰昔如來有記第二五百年此子當為大教主即與剃髮至巴連弗城聞諸外道欲障佛法祖乃執長幡入彼衆中彼問祖曰汝何不前祖曰汝何不後彼曰汝似賤人祖曰汝似良人彼曰汝解何法祖曰汝百不解彼曰我欲得佛祖曰我灼然得彼曰汝不合得祖曰元道我得汝實不得彼曰汝既不得云何言得祖曰汝有我故所以不得我無我我故自當得彼辭既屈乃問祖曰汝名何等祖曰我名迦那提婆彼衆夙聞祖名咸悔過歸伏祖隨告羅睺羅多而付法眼偈曰本對傳法人為說解脫理於法實無證無終亦無始因邪打正逞襟懷入水求人似有乖二五百年傳佛記好攜瓢杖踏煙霾十六祖羅睺羅多尊者行化至室羅筏城有河名金水寶莊嚴王之子號僧伽難提者居河之源安坐入定祖與學衆溯流而上伺之三七日難提從定起祖問曰汝心定耶身定耶提曰身心俱定祖曰身心俱定何有出入提曰雖有出入不失定相如金在井金體常寂祖曰若金在井若金出井金無動靜何物出入提曰言金動靜何物出入言金出入金非動靜祖曰若金在井出者何金若金出井在者何物提曰金若出井在者非金金若在井出者非物祖曰此義不然提曰彼義非著祖曰此義當墮提曰彼義不成祖曰彼義不成我義成矣提曰我義雖成法非我故祖曰我義已成我無我故提曰我無我故復成何義祖曰我無我故故成汝義提曰仁者師誰得是無我祖曰我師迦那提婆證是無我難提以偈贊曰稽首提婆師而出于仁者仁者無我故我欲師仁者祖以偈答曰我已無我故汝須見我我汝若師我故知我非我我難提心意豁然即求度脫祖曰汝心自在非我所繫語已即以大法囑付祖說偈曰於法實無證不取亦不離法非有無相內外云何起難提聞命說偈贊曰善哉大聖者心明逾日月一光照世界暗魔無不拔大象遊行兔徑希義持金井涉離微豁然心意無我我千聖同途把手歸十七祖僧伽難提尊者行化摩提國歷山谷間至一峰下時山舍有童子持圓鑑直造祖前祖問汝幾歲耶曰百歲祖曰汝年尚幼何言百歲童曰我不會理正百歲耳祖曰汝善機耶童曰佛言若人生百歲不會諸佛機不如生一日而得決了之祖曰汝手中者當何所表童曰諸佛大圓鑑內外無瑕翳兩人同得見心眼皆相似其父命隨祖出家祖為名伽耶舍多後復因風吹殿鈴聲祖問曰鈴鳴耶風鳴耶舍多曰非風鈴鳴我心鳴耳祖曰心復誰乎舍多曰俱寂靜故祖曰善哉善哉繼吾道者非子而誰即付法眼偈曰心地本無生因地從緣起緣種不相妨華果亦復爾圓鑑風鈴徹底清童兒百歲語人驚現成公案親分付花果圓來又發萌十八祖伽耶舍多尊者經大月氏國婆羅門鳩摩羅多之舍祖將入羅多問曰是何徒衆祖曰是佛弟子羅多一聞佛號心神悚然即時閉戶祖良久扣其門羅多曰此舍無人祖曰答無者誰羅多聞已遂發宿智付法偈曰有種有心地因緣能發萌于緣不相礙當生生不生佛號才聞即悚神開門元是閉門人為憐擊破牢關鍵一樹寒梅劫外春十九祖鳩摩羅多尊者適中天竺國有大士名闍夜多問仁夭暴壽逆吉義凶之故祖答以善惡有三時報夜多頓釋所疑祖曰汝雖已信三業而未明業從惑生惑依識有識依不覺不覺依心心本清淨無生滅無造作無報應無勝負寂寂然靈靈然汝若入此法門可與諸佛同矣一切善惡有為無為皆如夢幻夜多領旨即發宿慧祖告曰吾今寂滅時至汝當紹行化跡付法偈曰性上本無生為對求人說於法既無得何懷決不決亡羊泣路事如麻夢幻空花總被遮宿慧頓明諸佛義何煩門外駕三車二十祖闍夜多尊者至羅閲城敷揚頓教彼有學衆惟尚辨論首者名婆修盤頭此云遍行常一食不臥六時禮佛清淨無欲為衆所歸祖欲度之問彼衆曰此遍行頭陀能修梵行可得佛道乎衆曰我師精進何故不得祖曰汝師與道遠矣設苦行歷於塵劫皆虛妄之本衆曰尊者蘊何德行而譏我師祖曰我不求道亦不顛倒我不禮佛亦不輕慢我不長坐亦不懈怠我不一食亦不雜食我不知足亦不貪欲心無所希名之曰道時遍行聞已發無漏智付法偈曰言下合無生同於法界性若能如是解通達事理竟苦行勤修路轉增懸崖撒手事何曾隔牆見角知牛在一種平常繼祖燈二十一祖婆修盤頭尊者羅閲城人行化至那提國王常自在問曰羅閲土風與此何異祖曰彼土曾三佛出世今王國有二師化導王曰二師者誰祖曰即王之次子摩拏羅乃其一也吾雖德薄敢當其一時王方同祖語忽使者報有象巨萬逼城祖曰拏羅出患解矣王遂命之拏羅出城向象大喝城為震動象皆顛仆馳散于是王大敬信命拏羅依祖出家祖授付法偈曰泡幻同無礙如何不了悟達法在其中非今亦非古賓主相看風土揚鄉談諺語灼然彰衆流截斷知端的海底泥牛趁夜光二十二祖摩拏羅尊者行化西印度知月氏國有鶴勒那比丘堪為法器乃躬往化之時鶴勒那以昔緣故感鶴衆相隨見祖遂問有何方便令彼解脫祖曰我有無上法寶汝當聽受化未來際即說偈曰心隨萬境轉轉處實能幽隨流認得性無喜亦無憂時鶴衆聞偈咸飛鳴而去衆鶴追隨業自殊一機掣斷始無疑飛鳴濯濯銜恩去物外超然識得伊二十三祖鶴勒那尊者中印度師子比丘問我欲求道當何用心祖曰汝欲求道無所用心曰既無用心誰作佛事祖曰若有用心即非功德汝若無作即是佛事經云我所作功德而無我所故師子聞已即入佛慧祖告曰我滅後五十年北天竺國當有難起嬰在汝身今以法眼付囑于汝善自護持乃說付法偈曰認得心性時可說不思議了了無可得得時不說知縵天網子頗相宜打鳳羅龍驀面欺一句了然超百億三賢十聖那能知二十四祖師子尊者求法嗣于罽賓國遇一長者引一子問祖曰此子名斯多當生便拳左手今二十年終未能舒祖即以手接曰可還我珠童子遽開手奉珠衆皆驚異長者令之出家以前緣故復名婆舍斯多祖即告之曰吾師密有懸記罹難非久如來正法眼藏今囑付汝汝應保護普潤來際偈曰正說知見時知見俱是心當心即知見知見即于今祖說偈已復以僧伽黎密付斯多俾之他國斯多受教乃抵南天捏緊拳頭二十年才逢識者便開拳目前多少淆訛事只許渠儂到處圓二十五祖婆舍斯多尊者受師子祖囑獨邁南天潛隱山谷天德王迎供王有二子長曰德勝次曰不如密多密多和柔德勝凶暴及即位惑外道說欲抑祖密多諫德勝囚之乃詰祖曰師子尊者已遇罽賓國王難何緣付法祖出尊者先所付僧伽黎示勝勝命焚之衣出五色光薪盡如故勝乃追悔禮祖立出密多密多遂求祖出家祖問曰汝欲出家當為何事密多曰我若出家不為其事祖曰不為何事密多曰不為俗事祖曰當為何事密多曰當為佛事祖曰王子智慧天至即度出家侍祖六年乃付法偈曰聖人說知見當境無是非我今悟真性無道亦無理密多受偈問衣可傳乎祖曰此衣為難故假以證汝身無難何假傳衣密多作禮罽賓揮劍一臂墮德勝焚衣滿面慚迥絶是非親嫡骨繩繩不斷語喃喃二十六祖不如密多尊者得法至東印度王堅固敬信于祖祖曰王國有聖當繼我法時國中有婆羅門子年二十幼失父母不知名氏或自稱瓔珞人遂呼為瓔珞童子丐行間里有問汝行何急即曰汝行何緩問何姓即曰與汝同姓人莫測之一日祖與王同車而出瓔珞稽首自陳往因祖乃名為般若多羅付法偈曰真性心地藏無頭亦無尾應緣而化物方便呼為智無頭無尾不曾藏逼塞虛空孰敢量瑟瑟金風輕泄漏枝枝丹桂自芬芳二十七祖般若多羅尊者因南印度香至王供以寶珠祖即取試三王子曰此珠圓明有能及否二王子皆曰此珠七寶中尊固無踰也第三王子菩提多羅曰此是世寶未足為上於諸寶中法寶為上此是世光未足為上於諸光中智光為上此是世明未足為上於諸明中心明為上此珠光明不能自照要假智光光辨於此既辨此已即知是珠既知是珠即明其寶若明其寶寶不自寶若辨其珠珠不自珠珠不自珠要假智珠而辨世珠寶不自寶要假智寶以明法寶然則師有其道其寶即現衆生有道心寶亦然祖歎其辨慧乃復問曰於諸物中何物無相曰於諸物中不起無相又問於諸物中何物最高曰於諸物中人我最高又問於諸物中何物最大曰於諸物中法性最大祖時知是法器默而混之香至厭世遂依祖出家祖以其通達大法乃名菩提達磨而告之曰如來以正法眼付大迦葉如是展轉乃至於我我今囑汝聽吾偈曰心地生諸種因事復生理果滿菩提圓花開世界起心明世寶別端倪迥出人間東與西一夜好風吹不輟曉來黃葉與階齊震旦初祖菩提達磨大師受西天二十七祖般若多羅囑識於梁普通七年來震旦初至金陵與武帝機不契寓止嵩山少林面壁而坐人莫之測二祖慧可躬詣求法立雪斷臂向祖問諸佛法印可得聞乎祖曰諸佛法印匪從人得可曰我心未安乞師與安祖曰將心來與汝安可良久曰覓心了不可得祖曰與汝安心竟可悟入越九年祖命門人曰時將至矣汝等合言所得有道副對曰如我所見不執文字不離文字而為道用祖曰汝得吾皮尼總持曰我今所解如慶喜見阿閦佛國一見更不再見祖曰汝得吾肉道育曰四大本空五陰非有而我見處無一法可得祖曰汝得吾骨慧可出禮三拜依位而立祖曰汝得吾髓乃顧可曰昔如來以正法眼付迦葉尊者展轉囑纍而至於我我今付汝汝當護持并授袈裟以為法信付法偈曰吾本來茲土傳法救迷情一花開五葉結果自然成頌曰長空雲淡沒間關月照松梢山影慳一片清光輝宇宙夜深兀坐聽潺湲面壁嵩山成話墮安心得髓恨添多西天法印分明極惱亂春風撼薜蘿二祖慧可大師從初祖得法博求法嗣時三祖為居士年踰四十不言名氏禮祖問曰弟子身纏風恙請和尚懺罪祖曰將罪來與汝懺士良久曰覓罪了不可得祖曰與汝懺罪竟宜依佛法僧住士曰今見和尚已知是僧未審何名佛法祖曰是心是佛是心是法法佛無二僧寶亦然士曰今日始知罪性不在內不在外不在中間如其心然佛法無二也祖深器之為之剃髮名曰僧璨付法偈曰本來緣有地因地種花生本來無有種花亦不曾生毒流四海廣無邊風恙纏身乞懺愆罪性頓空三寶住夜寒月映渡頭船三祖僧璨大師自二祖授法深自韜晦居無常處積十餘載人無知者四祖道信時為沙彌年始十四禮祖問曰願和尚慈悲乞與解脫法門祖曰誰縛汝曰無人縛祖曰何更求解脫乎信于言下大悟服勞九載付法偈曰花種雖因地從地種花生若無人下種花地盡無生受恩深處本無多一語相投便上科解脫法門誰縛汝信知脫下自淆訛四祖道信大師嗣法三祖住蘄春破頭山學侶雲臻一日往黃梅縣路逢一小兒骨相奇秀異乎常童祖問曰子何姓答曰姓即有不是常姓祖曰是何姓答曰是佛性祖曰汝無姓耶答曰性空故無祖默識是法器即遣侍者從其母乞出家後付法偈曰花種有生性因地花生生大緣與性合當生生不生破頭山上播真風喜得黃梅驀地逢性有性無全體露小兒原是老栽松五祖弘忍大師前身為破頭山中栽松道者轉遇四祖得法嗣化六祖時為居士姓盧名慧能聞讀金剛經有省自新州來參祖祖令隨衆作務祖一日令衆述偈意符則授衣法會下七百餘僧上座神秀者于廊壁書偈曰身似菩提樹心如明鏡臺時時勤拂拭莫使惹塵埃祖見知秀所作乃讚歎曰後人依此修行亦得勝果各令念誦盧在碓坊聞之至夜倩人于秀偈側亦書一偈曰菩提本無樹明鏡亦非臺本來無一物何處惹塵埃祖見曰此是誰作亦未見性衆聞祖語遂不之顧逮夜祖潛詣碓坊問曰米白也未盧曰白也未有篩祖以杖擊碓三下而去盧即三鼓入室祖密付衣法囑善保護無令斷絶付法偈曰有情來下種因地果還生無情既無種無性亦無生本來無物頂𩕳開米白倩篩滿面灰三鼓密傳衣鉢去刻舟爭見化龍才六祖慧能大師黃梅得法後住曹溪南嶽讓祖來參祖問甚麼處來讓曰嵩山來祖曰什麼物恁麼來讓無語經八載忽然有省乃白祖曰某甲有個會處祖曰作麼生師曰說似一物即不中祖曰還假修證否讓曰修證則不無染污即不得祖曰祗此不污染諸佛之所護念汝既如是吾亦如是祖為說法偈曰心地含諸種普雨悉皆生頓悟花情已菩提果自成當陽一拶遠趨風八載投機亦不中修證不無染不得山叢叢處水濛濛曹溪第二世南嶽懷讓禪師見馬祖常習坐禪師問曰大德坐禪圖甚麼祖曰圖作佛師乃取一磚於彼菴前石上磨祖曰磨作甚麼師曰磨作鏡祖曰磨磚豈得成鏡耶師曰磨磚既不成鏡坐禪豈得作佛祖曰如何即是師曰如牛駕車車若不行打車即是打牛即是祖無對師又曰汝學坐禪為學坐佛若學坐禪禪非坐臥若學坐佛佛非定相於無住法不應取捨汝若坐佛即是殺佛若執坐相非達其理祖聞示誨如飲醍醐禮拜問曰如何用心即合無相三昧師曰汝學心地法門如下種子我說法要譬彼天澤汝緣合故當見其道又問道非色相云何能見師曰心地法眼能見乎道無相三昧亦復然矣祖曰有成壞否師曰若以成壞聚散而見道者非見道也乃說偈曰心地含諸種遇澤悉皆萌三昧花無相何壞復何成祖遂開悟心意超然侍奉九秋日益玄奧輕輕閫外展機籌引玉拋磚格異眸打疊車牛三昧起木童騎鶴上楊州曹溪第三世江西馬祖道一禪師百丈為侍者一日侍祖行次見一群野鴨飛過祖曰是甚麼丈曰野鴨子祖曰甚處去也丈曰飛過去也祖遂把丈鼻扭負痛失聲祖曰又道飛過去也丈於言下有省又後侍立次祖目視繩床角拂子丈曰即此用離此用祖曰汝向後開兩片皮將何為人丈取拂子豎起祖曰即此用離此用丈挂拂子於舊處祖振威一喝丈直得三日耳聾祖付法偈曰心外本無法有付非心法既知非法心如是付心法鼻痛始知燈是火耳聾難掩掣風顛大千沙界文同軌天自高兮海自淵曹溪第四世洪州百丈山懷海禪師一日謂衆曰佛法不是小事老僧昔被馬大師一喝直得三日耳聾時黃檗聞舉不覺吐舌師曰子已後莫承嗣馬祖去麼檗曰不然今日因和尚舉得見馬祖大機大用然且不識馬祖若嗣馬祖已後喪我兒孫師曰如是如是見與師齊減師半德見過于師方堪傳授子甚有超師之見檗便禮拜師付法偈曰本無言語囑強以心法傳汝既受持去心法更何言陳年蠱毒水難當觸著通身皮骨喪識得根源為活計一般酥酪是砒礵曹溪第五世洪州黃檗山希運禪師臨濟在師會下行業純一首座睦州嘆曰雖是後生與衆有異遂問上座在此多少時濟云三年座云曾參問也無濟云不曾參問不知問個什麼座云汝何不去問堂頭和尚如何是佛法的的大意濟便問聲未絶師便打濟下來座云問話作麼生濟云某甲問聲未絶和尚便打某甲不會座云但更去問濟又問師又打濟如是三度問師三度打濟白首座云幸蒙慈悲令某甲問訊和尚三度發問三度被打自恨障緣不領深旨今且辭去座云汝若去時須辭和尚去濟禮拜退座先到師白云問話底後生甚是如法若來辭時方便接他向後成一株大樹與天下人作陰涼去在濟辭師師囑云不得往別處去汝向高安灘頭大愚處去必為汝說濟到大愚愚問甚處來濟云黃檗來愚曰黃檗有何言句濟曰某甲三度問佛法的的大意三度被打不知某甲有過無過愚曰黃檗與麼老婆心切為汝得徹困更來者裡問有過無過濟于言下大悟云元來黃檗佛法無多子愚搊住曰者尿床鬼子適來道有過無過如今卻道黃檗佛法無多子你見個甚麼道理速道速道濟遂築大愚脅下三拳愚拓開曰汝師黃檗非干我事濟便回師見便問者漢來來去去有甚了期濟云秪為老婆心切人事了侍立師又問什麼處去來濟云昨奉慈旨令參大愚去來師云大愚有何言句濟遂舉前話師云作麼生得者漢來待痛與一頓濟云說甚麼待來即今便喫隨後便掌師云者風顛漢卻來者裡捋虎鬚濟便喝師云侍者引者風顛漢參堂去後付偈曰病時心法在不病心法無吾所付心法不在心法途三回痛棒骨生痕一築高安便答恩更把虎鬚頻倒捋乾坤攪動斗星昏曹溪第六世鎮州臨濟義玄禪師興化為侍者機緣默契師以法偈印之偈曰至道無揀擇本心無向背便如此承當春風增瞌睡化後充三聖首座次任大覺院主云云開堂日此一炷香本為三聖師兄三聖於我太孤本為大覺師兄大覺於我太賒不如供養臨濟先師家富兒嬌無揀擇機籌互換始承當春風瞌睡流千古有眼如盲日正央頂𩕳豎亞摩醯眼肘後橫懸奪命符毒氣迸開無限意賺他驢糞較賒孤臨濟第二世魏府興化存獎禪師南院久依座下師以法偈付曰大道全自心亦非在心求付汝自心道無喜亦無憂自心大道沒遮藏花笑鳥啼山更長月白不從門外得踢翻尿器露風光臨濟第三世汝州南院慧顒禪師風穴在會作園頭師一日入園問云南方一棒作麼生商量穴云作奇特商量穴卻問和尚此間一棒作麼商量師拈棒云棒下無生忍臨機不見師穴於言下大徹依止六年師付法偈曰我今無法說所說皆非法今付無法法不可住于法棒下無生絶較量臨機不見太郎當顒翁若遇風顛漢劈面攔腮沒處藏臨濟第四世汝州風穴延沼禪師首山充知客時常密誦法華一日侍立次師乃垂涕告曰不幸臨濟之道至吾將墜于地山曰觀此一衆豈無人耶師曰聰明者多見性者少山曰如某者如何師曰吾雖望子之久猶恐耽著此經不能放下山曰此亦可事願聞其要師於是上堂舉世尊以青蓮目顧視大衆迦葉正當與麼時且道說個什麼若道不說而說又是埋沒先聖且道說個什麼山拂袖而退師擲下拄杖歸方丈次日山與真園頭同上問訊師問真曰作麼生是世尊不說說真曰鵓鳩樹頭鳴師曰你作許多癡福作麼何不體究言句又問山曰你作麼生山曰動容揚古路不墮悄然機師謂真曰