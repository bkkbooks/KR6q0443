body:
  text: 住秀州三塔景德禪寺嗣法門人圓法編機緣師舉臨濟大師云有一無位真人常在汝等面門出入未證據者看看衆無對師顧遠門禪師云如何是無位真人遠一喝師云畢竟是何面目遠以袖掩師口師云別道遠云鼻孔依然向下垂師云三世諸佛為甚麼不知有遠云相逢盡道休官去師云狸奴白牯為甚麼卻知有遠云林下何曾見一人師對傍僧云汝何不看他下語僧問大事未明乞師指示師云與我過竹篦來僧便呈師接得便打僧云為甚打某甲師云汝這般逐塊漢不打更待何時又打素弘參師云汝還識我麼弘云識即不無爭奈落二落三了也師便打弘禮拜一晚師指琉璃問素弘經云如淨琉璃內外明徹為甚有時明有時暗弘云一任和尚分別師云分別且置畢竟作麼生弘云打破琉璃來向和尚道師云破時又如何弘頓足三下師云正好喫棒便歸方丈牧山參才禮拜師便打山便喝師云更喝喝看山云好個話端師云且坐喫茶師與牧山茶次有兩居士在坐師顧士云咬咬菱角士罔措師將菱拗作兩橛分士山云作家宗師師云難瞞衲子山云兩重公案師便打山擲下菱角師云山僧罪過山便出師一日問衆我身體不安汝等還安也未素穎答云老老大大作這個語話師頷之僧參作虎聲師作怕勢僧擬議師云這掠虛漢直打出茶次師問天真茶味如何真無對師問天巖云你作麼生巖遂潑茶師云未在巖遂出師問古璧你一向在諸方參得底與我拋卻東洋大海裏去舉拂子云向這裏道將一句來古云某甲禮拜和尚師打一拂云更道古便禮拜師亦打羅子先居士參不是物話師問今日事如何士云十方三世秪是這個喚作一物便落窠臼師云如何是你不落窠臼底士佇思師云才涉思惟千里萬里便打一如意師問如何是探竿影草一僧云情知和尚出某甲手腳不得師謂僧云是你答底那僧云是師云卻是你出我手腳不得師一晚論一喝不作一喝用僧云和尚曾有語麼師云有僧遂問師便打僧擬答師云當時有人與麼問直打折一條拄杖子僧云說甚麼當時語未了師又打元旦東巖問堯風蕩蕩舜日熙熙新年頭佛法請師祝聖師舉如意云萬歲萬歲巖云恁麼則一人有慶兆民賴之師云亙古亙今巖云還許學人讚歎也無師云試亂統看巖便禮拜師云今日且放過既白參師以杖畫地云向這裏道一句看白拂坐具云道個甚麼師便打白喝師云胡喝亂喝白云還喚作喝得麼師亦打白禮拜履坦參師云道得也一棒道不得也一棒意作麼生坦云自遠趨風合施三拜師便打坦云今日始遇作家師又打坦云和尚得與麼老婆心切師云你那裏見得坦喝師亦打師舉趙州勘婆話問疏我那裏是他勘破處我云瞞和尚不得師云勘破了也我擬議師便打師問祖印清風拂翠竹白日印青天且道是何意旨印云秋來分外涼師哂之一日既白呈頌次師云那一則頌也未白云早已頌過了也師云何不呈似老僧看白展兩手師便打天蔭參師云那裏來蔭云吳江師云這樣大水爭得到這裏蔭云無毛鷂子潑天飛師云昨日雨今日晴又作麼生蔭云和尚不得分身兩處看師便打蔭便喝師又打師為亡僧舉火回僧問亡僧遷化向甚麼處去師云貓僧擬議師劈面掌出僧參師云那裏住僧云普賢寺師云曾見普賢麼僧無對復問洞山麻三斤意旨如何師云我適上山來走得氣急歇歇向汝道僧茫然師云去一僧求開示進堂師云你做什麼來僧云巡山師云昨夜賊來偷竹子去你還知麼僧罔措師云你且去巡山僧問如何是學人親切處師云一棒兩條痕僧問如何是祖師西來意師云金風吹秀水桐葉落莓苔居士問盡大地是刀鎗不動干戈如何得勝師云山僧從來不眼花陸君重文學問經云受持四句偈等不知那四句是師提起數珠云向這裏會取士禮謝師示偈云瞿曇宣妙偈不屬前後句當機覿面提我無隱乎爾高峰僧參師云你是高峰那僧云是師云既是高峰為甚在我腳下僧無語師便打主峰參師問那裏來峰云江北師卓拄杖云還識得這個麼峰云瞞某甲不得師便打峰禮拜師云納敗不少主峰入室師豎起拂子峰便喝師云從上佛祖盡向這裏流出你還見麼峰云這夥老古錐又恁麼去也師云你甚處見得峰又喝便禮拜師云三十棒一棒也少不得遂擲下師與曹司農看山翁録中上問參禪悟後人還有喜怒哀樂也無山云逆之則怒順之則歡師云金明則不然曹云和尚如何師云但對道不是喜怒哀樂曹大悅禹公參師云那裏來禹云棲雲師便打禹禮拜師亦打茶次語及參禪師云我這裏無禪與你參禹云恁麼則孤負學人來也師云原來是個禪客禹云和尚不得壓良為賤師云識甚好惡僧問承聞和尚有四破如何是破破師云卸甲倒戈全體現如何是不破破師云阿旁獄卒悉皈降如何是破不破師云王令已行天下遍如何是不破不破師云將軍塞外絶煙塵僧禮謝師便打師問衆云昔年我在興善時聞殿上賊偷靈聖去曾有一問既是靈聖因甚被賊偷卻衆無下語今日汝等著語看主峰云也是抱贓叫屈師頷之居士問供養百千諸佛不如供養一個無心道人既是無心為甚受人供養師展兩手示之又問猝風暴雨中路相逢如何躲避師云看腳下陸元度居士參師云南老人録請得來麼士云在師云在那裏士展兩手云請和尚看師云且待來日僧問昔有一鬼障佛光明失其兩眼只如打破琉璃又作麼生師云遍十八僧問經云毀謗三寶應墮惡道即如打僧還有罪過否師云不罪過僧云為甚麼不罪過師云得人一牛還人一馬有甚麼罪過師同蔡子穀居士閲雪嶠和尚初參龍池幻老人機緣幻豎一指云會麼雪云這個喚作甚麼幻微笑次年又參穿草鞋直上方丈幻云你草鞋猶未脫也雪云何處見草鞋來幻又微笑師對居士云你看他兩處微笑是何意旨士看畢復問云還是肯他不肯他師云但看即得士云一點水墨兩處成龍師亦微笑師問田道耕居士云田中事作麼生士云荒蕪久矣師云將何納稅士云也要和尚出隻手師云何苦殃及士便禮拜師示偈云良田本得不多爭道眼分明豈斷耕且喜秋成家業穩法門零落賴扶撐師經行次立住問衆云龐公倒身靈照相救趙州抱柱南泉出手金明也不倒身也不抱柱汝等作麼生相救衆下語不契師云蒼天便歸方丈侍僧云當時無趣無幻二老人常在范蠡湖頭步月有機語載在録中師云我未住金明時石雨和尚在敬畏庵上堂僧問如何是無趣塔中事石云金明寺前看取後石遷化我住金明這段因緣為是神通法爾為復別有奇緣侍僧無對令衆下語一云難逃業債一云月沉湖底靜千古逼人寒一云溪深杓柄長一云龍騰雲起虎嘯風生師云有甚交涉衆請師代語云不因同道者埋沒老天封師揀藥次一僧呈偈師接搓作團問云且道是病是藥僧云是病師便打復喚一僧云你道是病是藥僧云是藥師亦打汪居士云藥病總不是師亦打師與王言遠方伯茶次談及法門事乃云近見得道者易莫非菩薩否師云居士你豈不是菩薩只恐不自信耳士點首僧問如何能由境滅師云闍黎進云如何境逐能沉師云還見老僧麼進云如何境由能境師云此間無老僧目前無闍黎進云如何能由境能師云目前無闍黎此間無老僧師垂語云數珠顆顆圓活為甚被一線穿卻勇云知恩報恩師云那裏是知恩處勇云船外風聲師云沒交涉真化云全承渠力師便打僧問諸方要出頭和尚為甚不肯師云任他浩浩地我觀大清國裏沒有個出頭底僧云如何是出頭底師云石敢當僧舉古德月落後相見話師云月落後作麼相見衆下語不恰自代云三十年後要舉此話也難得一日行者著境師以杖擊之者聞鬼神相喚云和尚來也我們去行者方脫師垂語云若道無鬼神為甚他與麼道若道有鬼神他為甚懼老僧衆下語師代云金明今日失利師問何花為尊貴衆無對師示偈云不屬陰陽造化功劫前開出少人逢若知問處真消息一朵優曇火裏紅別傳答云天然尊貴絶施功睫上分明處處逢若可拈將來舉似依然瞽者睹青紅呈師師云如子所見以何為證別即禮拜師便打別云請和尚歸方丈師乃休師問別傳如何是出頭一句別云天上天下師云猶未出頭在別便喝師云好一喝別默然師云你問我別如前問師云去取水與老僧別禮謝曹秋嶽居士看師法語次師云連日被衆居士相逼今日又塞責一上士云正是和尚老婆心切師云又被你居士看破曇維那入室師舉臨濟大師橫也打豎也打如何意旨曇云徹骨徹髓師云子如何免得曇云某甲知恩有分師云如何是你知恩處曇便掌師云你亦捋虎鬚那曇便禮拜師云只如人問你獅子窟中事你作麼生曇便喝師云還別有麼曇云有請和尚問師云老僧問過了曇云某甲亦答過和尚了也便出僧請問工夫師云你會喫飯否僧云飯會喫師云將甚麼喫僧云將口喫師云口不自動如何會喫僧云將心喫師云心無形相作麼生喫僧無對懶若參才入門師云看檻若呈坐具師便喝若亦喝師云更下一喝看若云又要某甲再道那師打云也少這棒不得若禮拜云謝和尚證明師亦打曇維那舉女子出定公案師云文殊罔明出得出不得且止你喚什麼作定那云今日不說師云為甚麼那云明日向和尚道師云子見如是已喫我三十棒了也那便禮拜項別駕參問涅槃心易曉差別智難明請問和尚如何差別智師云差別且置涅槃心在什麼處士云弟子只是說不出師云這便是差別了也性侍者參禮師與一掌性云和尚可聞雷麼師又掌性禮拜師云可惜兩掌性一喝師云好一喝性擬答師與一喝性禮拜師便打僧問四大分離法性在何處師云水漲船高三僧參禮師便打一僧喝師云不是那一個看打左僧左云這老漢漏逗不少師又打右僧云放過則不可右僧云今日只得口啞師云且參堂去頂居士參三不是話一日呈解師盡情掃闢乃云此事不從人得士問云師從何得師舉茶杯士佇思師云你作麼生士舉拳師正色云死了燒了在甚麼處士無對師震威一喝士驀然禮拜師以如意打云見何道理便禮拜士云道過了也師云今好留心除夕徐敬可朱晉臣二居士參師敬可問年三十夜到來時如何師云窮士云新年佛法作麼生師云明日向你道士云除卻新舊正當恁麼時如何師喚小童云打茶與居士喫黃道婆避大兵歸參師云你避在何處婆云避在和尚處師云因甚我不見婆云若見依前眼裏又添沙師云若見則不避在和尚處師一夕與隱嵩孫樹下經行次問馬祖三十年不少鹽醬意旨如何隱云問他作麼師云也須知始得隱云老和尚又如何師云古木交加一天風月師與祖巖論及宗門中事巖云若論平實一路猶可商量陟險一機人難措置師云正好下語巖云須是和尚始得師云杜撰禪和巖云且放過和尚師云亂統巖禮拜云真豐罪過師云卻是我放過你師問田頭云你在家種田出家種田若道同原是俗人若道別為甚在家六科出家亦六科田頭罔然師玩月云汝等看月在樹裏樹在月裏一僧云秪在目前師云你參學多年俗氣也不除師遊何山前有獅象兩山即垂語云獅子回旋象王奮迅此名何山復是何物古首座云瞞和尚不得素維那云緑陰深處囀黃鸝別書記云行人更在青山外師問斐公云你聻斐云兩眼對兩眼師云何不道獨坐大雄峰斐云有和尚在這裏師云墮也墮也斐云讓老漢一頭地師擊禪床三下斐云又上一層霜師云大好山水師問一士云既是宜興貨為甚麼在你店裏士無對師代云和尚莫搶奪行市曹方伯赴任廣東過別師送至門伯云乞和尚行道法師驟步云至此以代遠送耳遂歸方丈師問哂菴興化受臨濟付後復向三聖大覺為復顯揚家醜為復別有商量菴云和尚是何心行師云正要你疑著菴云疑著則錯師云如何是不錯底菴轉身便禮拜師打一拂子師問竹菴殃崛産難因緣你作麼生菴作呱呱聲師云是男是女菴珍重作禮師便打師問竹菴女子出定文殊乃七佛之師因甚出不得罔明初地菩薩因甚卻出得菴云文殊用盡腕力錯用牛刀罔明因風吹火迥出乾坤總是一狀領過師云秪如老僧常在定子作麼生出菴遂高聲云和尚師良久云汝道老僧出不出菴便捧壺作斟茶勢師大笑桐邑陸大勝居士舉世祖問木陳和尚云如何是孔顏樂處答云一個閒人天地間又問玉林和尚答云憂心悄悄此二語和尚以為何如師云金明又不然陸云乞為垂示師云我與居士且喫茶陸大悅師問佛音螞蟻負一座須彌山繞四大部洲轉汝還信得及否音云信師云作麼生音便扣桌一下師云亂道可度參師舉如意云道道看度云道什麼師云當知受用不盡度云知恩報恩師云作麼生度抽具便出師到三塔方丈問主峰長老云這是什麼像主云送子觀音祈求必應師云與人祈何不自求一個主云求底不是子師云恁麼更須著力師一日看花問潤生花紅耶眼紅耶心紅耶生微笑便歸堂師示以偈曰花不自紅心眼非憐兒擲下釣鼇磯雖然微笑歸堂去也是如蟲禦木機更下語看生云再犯不容師云亂道衡山參才展具師便打山喝師云是何意旨山擬答師又打山又喝師復打云且道是賞是罰山禮拜師亦打山鐸在維那一日入室次師曰不是心不是佛不是物是個甚麼在云露師曰昨日有人恁麼道三十棒趁出了也在云要打便打說甚昨日隨聲便掌師約住曰者瞎驢亂作那在云賺吾來也師曰且莫亂統今日事作麼生在震威一喝師拈拄杖在便出在維那次早復入方丈作禮師曰昨日公案未圓子試圓看在打露柱一掌云癡樁樁地作麼師曰怎奈目前何在云者一掌合是某甲喫師便喝在亦喝師曰三喝四喝後又作麼生在連喝兩喝師曰識此一喝恩大難酬在珍重禮三拜師遂出源流法偈付之辛亥秋逾祖覺公參人事畢師曰諸方參得底拈向一邊道得也打道不得也打覺便喝師云除卻者喝更道看覺云特來親近和尚師以拂打云是賞是罰覺便禮拜師又打覺豁然大悟云將此身心奉塵剎師度拂子與覺覺隨接打傍僧一下云是則名為報佛恩師云子當珍重師與銓部文鐙岩居士茶次云及東岩山鐸二子在廬山話師云昔有貴鄉黃海岸令嗣來貧道病中失晤士云黃老師無嗣師云今日幸晤士云斷橋老人在何處師便揮扇一下士乃俯首師云請茶南庵主看臺幃師云你被紅緑換了眼睛主云換他不得師云如何換他不得主豎拳師云你問來主問和尚如何師云紅紅緑緑主點首師云紅紅緑緑你如何會主云臺子四隻腳師乃休許無聲文學請師開示師云曾看語録否士云曾看臨濟在黃檗喫棒公案弟子領會得師云你作麼生會士云待和尚棒便會師云與麼則落七落八鈍置了也士佇思師云我有三十棒你未入門早已喫我也還知麼士罔然師云你但參取這棒去少頃士禮拜云真馨不待和尚棒師云你喚什麼作棒便打士踴躍而退問答僧持興福牧雲和尚十問乞師代語問雪子落紛紛因甚變成雨師云漏逗不少問河路既通楓橋船因甚不到師云利動君子問久旱逢甘雨物情皆喜為甚麼石敢當只是不點頭師云作家作家問昨日雨今日晴覆盆之隙尚可容光庭前竹子心裏日月如何照臨師云一莖兩莖斜三莖四莖曲問路逢劍客須呈劍不是詩人莫獻詩且道函人與矢人相見要得投分呈個甚麼即得師云用呈作麼問相看兩不厭只有敬亭山且道敬亭山具甚麼眼師云清風匝地問一錢為本萬錢為利早晚時價不同因甚滯貨不脫師云阿誰識得伊問炙背可以獻天子大好笑事因甚載留典籍師云今古罕聞問色斯舉矣翔而後集因甚山梁雉鳥撞入網中師云達者方知問既是村僧理合隨緣因甚只想山中師云今日失利答鐵輪法孫監院大慈庵八問問歇心堂七穿八穴為甚卻向桃花塢裏卓錫師云不是苦心人不知問慈行樹拄地撐天因甚含元殿蓋覆不得師云汝不枉為我孫問百步溪魚行水濁鳥飛毛落未審亮座主即今甚處安居師云切忌妄通消息問掛笠軒目視雲霄毗廬師法身主拋向爛草堆頭阿誰著眼師云待虛空撲地卻向汝道問示耕室個個披蓑頂笠露地牛全無巴鼻為是溈山舊例百丈繩規師云三十年後有人悟去在問大慈院釣風弄月打水魚驚還是為人句別有道理師云莫謗老僧問勝山居竹影穿窗蘆花透室畢竟為祥為瑞師云汝廬山到此一千八百里腳下猶帶泥水在問草泉池世所罕逢大慈近日朝烹暮煮為甚無人飲著師云老僧許伊具眼答僧問十智同真僧問如何是汾陽十智同真師彈指一下云會麼僧云不會師云逐一問來問如何是一同一質師云軟如綿硬似鐵問二同大事師云飢時飯倦則眠問三總同參師云魚龍蝦蜆問四同真智師云貓兒偏解捕鼠問五同遍普師云總跳不出問六同具足師云阿誰缺少問七同得失師云衣破露出肘問八同生殺師云倚天長劍逼人寒問九同音吼師云驢鳴犬吠問十同得入師云看腳下問甚麼人同得入師云突出難辨問與誰同音吼師云一掌一握血問作麼生同生殺師云賞罰分明問甚麼物同得失師云拋出大家看問阿那個同具足師云眼裏無筋一世貧問是甚麼同遍普師云空裏念摩訶問何人同真智師云無孔鐵鎚問孰與總同參師云清風拂白月問那個同大事師云銜鐵負鞍問何物同一質師云漆桶不快答龍岩問六刮問如何是就毛刮塵師云你問我答問如何是就皮刮毛師云忠言逆耳問如何是就肉刮皮師云賴知痛癢問如何是就骨刮肉師云直教他死不得活不得問如何是就髓刮骨師云墮也墮也問秪如髓又如何刮師云待剎竿倒卻即向汝道全豁問臨濟大師云第一句薦得可與佛祖為師如何是第一句師云千聖莫測云第二句薦得可與人天為師如何是第二句師云突出難辨云第三句薦得自救不了如何是第三句師云有問有答云三句已蒙師指示最上宗乘事若何師云徹骨徹髓云即今堂奧中事又作麼生師云終不向你道云臨行一句有何分付師便打全一喝師云再喝喝看全禮拜師云禮拜始得師云落葉知秋晚逢煙見火遲歸鴉鳴古木幾度好風吹有應時底不妨道將一句來梵為云不道不道師云為甚不道梵云只為公案現成師云現成在何處梵便喝師便打垂問即事十二問秀州古寺莫不南面且道金明為甚獨背卻人皆曰富若陶朱及乎到此為甚赤骨𩪸地檇李亭覿面相呈為甚往來寺前不見一擊忘所知更不假修持且道他香嚴悟個甚麼盡法界是個阿字圖為甚有入與不入天封室貴在藏鋒密用為甚相逢便劈面一錐使人無回避處古云范蠡湖有龍出現今此潭深水清為是浪得其名為復風雷乘便獅子窟中應無異獸因甚有此狗子范蠡大夫越國臣子為甚卻居吳地遍地葛藤如許得何神通不被絆倒百城環繞川流不息千佛閣坐斷要津且道各逞神通為復別有道理一條白鍊掛在山門見與不見總被穿卻如何免得此過祈雨垂問各處人人妄想為甚祈不得雨自代云正好疑著一處不妄想為甚卻自得雨自代云秪是少他不得天道至公無私為甚有得有不得自代云蒼天蒼天師垂問老僧要塑一尊祖師像且道祖師法身高多少自代云請和尚度取又云恰好即事垂語雪月爭明梅花大笑為甚麼卻被露柱不肯自代云不經一事不長一智垂語好肉生瘡不為分外因甚要割而治之自代云貴圖天下太平師喜隨衆務一日侍僧勸止師即垂語云百丈一日不作一日不食為復無人代作為復為人榜樣衆下語不恰乞師代語師云慚愧師垂語人人有個鼻孔為甚不知香臭一僧出禮拜師便打臘八日陳渭如居士送善財來師問天隨云今日善財入門你作麼生隨云正是好消息師云好在什麼處隨云在這裡師云親切道一句看隨云穿衣喫飯便禮拜師打
