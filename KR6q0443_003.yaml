body:
  text: 住蘄州三角禪寺嗣法門人真文等編示衆崇禎癸未冬師受徑山觀音殿朗玄監院請結制示衆欲識佛性義當觀時節因緣時節若至其理自彰秪如今日結制諸方必有上堂小參攢花簇錦巧妙尖新布縵天網羅龍打鳳撿點將來盡落時弊徑山則不然且道如何施設顧視大衆云白日青天切莫瞌睡好拍膝一下便起僧問如何是徑山境師云百萬松杉雙徑杳三千樓閣五峰寒僧云如何是境中人師云九九八十一僧云人境已蒙師指示向上宗乘事若何師便打問徑山祖窟八十七代祖師未審在何處師云眉毛在睫上僧云不會師云佛殿前看取因雪示衆百萬松杉被雪埋簷前鴉鵲繞生臺尋思秪為飢無食遠遠飛從殿角來召大衆云既是百萬松杉被雪埋為甚麼殿角不被覆卻衆下語不契師代云無他棲泊處師為雪轎大師上堂白槌云法筵龍象衆當觀第一義便一椎嶠乃震威一喝有僧請益師示偈云一惟一喝震天嘶就裡明機孰可知獨許凌霄委此事石人撫掌笑嘻嘻解制示衆豁開戶牖當軒者誰若也見得不妨腰包頂笠竿木隨身一任南天台北五臺其或未然各須照顧腳下好師住餘杭廣福寺示衆舉先廣福惟尚禪師述偈呈覺印印豎拳云正當恁麼時作麼生尚掀倒禪床印遂喝尚云賊過後張弓便出師云覺印恁麼接人固是勾賊破家惟尚雖則當仁不讓早已墮坑落塹且道新廣福又作麼生客來無管待蒿湯備禮儀師住鍾溪太平菴示衆四月村莊菜麥黃銜泥紫燕語聲狂太平境色誰人委獨坐溪頭看水忙示衆僧問師燒木佛意旨如何師云圖取舍利僧云為甚某甲不見師云瞎乃云大凡燒神化佛須具這些眼目始得不然各各照顧眉毛好只如趙州道金佛不度爐木佛不度火泥佛不度水真佛內裏坐又作麼生驀召衆云還見真佛麼衆無語師呼行者點燈來便歸方丈師住武康天池寺示衆舉玉芝禪師問碧峰如何得不落人圈繢峰打一掌云是落也是不落也師云玉芝父子與麼問答大似二俱不了或問新天池但向他道未有這個消息道將一句來他若擬議劈脊便棒師置一斫刀日隨衆務遂舉起刀示衆云亦能伐材亦能養材復偈曰剛刀銛利出紅爐斫盡雲根不用磨衲子腰間曾佩得何愁栗棘葛藤窠示衆舉玉芝禪師因陸五臺問東土一千七百善知識即今向什麼處去了芝指庭樹鳴蟬云這裏也有一個臺云只這聲響便是麼芝云喚作聲響即錯過去也師云玉芝與麼為人不惟被此老看破要作他臨濟兒孫未得在且道天池又作麼生誰知遠煙浪別有好商量因僧説夢師舉仰山夢入彌勒院見堂中諸位皆足惟第二位空仰山遂坐有一尊者白椎云今當第二位説法仰山云摩訶衍法離四句絶百非諦聽諦聽及覺舉似溈山山云子已入聖位仰山便禮拜師云溈仰父子夢中説夢致纍後昆瞌睡不醒隨語生解召大衆云還有不夢者麼良久云更深猶自可午後更愁人便起除夕示衆收拾間家具燒除爛葛藤山房分歲靜深夜獨挑燈上元示衆千燈萬燈從這一燈起且道這一燈從何處起苟知落處交光相羅燈燈無礙秪如十方俱擊鼓十處一齊聞東家點燈西家暗坐又作麼生良久云一種是聲無限意有堪聽處不堪聽示衆細雨落花香冷淡晚風敲竹響晴空西來祖意我不會午夜推窗月上東示衆舉雪菴示衆云乍住城隍寺無東又缺西汝才抬眼起我便放頭低鬚髮白如雪身心爛似泥本來無佛法何處是全提逆川和尚拈云雪菴和尚固是尋常説話其奈家醜外揚雅山則不然水自悠悠雲自間紫廛原不異青山缺長欠短尋常事只恐葫蘆醋不酸師云二老各逞家風別調固是雪曲陽春其奈高和者稀金明又且不然城市山居絶異同頽然蒲坐沒西東身心佛法俱潦倒見色聞聲不用聾示衆大士神通無剎不現總皆知之及乎妙相莊嚴於十字街頭無人識得金明為伊慶誕且道作麼生慶翻轉地皮苔尺厚剷去堂前草丈深還見觀音大士麼維那云昨夜三更月到窗師大笑歸方丈示衆舉僧問雪峰古澗寒泉時如何峰云瞪目不見底飲者如何峰云不從口入趙州聞舉呵呵大笑云不可從鼻孔入僧卻問古澗寒泉時如何州云苦飲者如何州云死雪峰得聞乃云趙州古佛遂遙作禮從此不答話大慧云雪峰不答話疑殺多少人趙州道苦面赤不如語直若是妙喜即不然古澗寒泉時如何到江扶櫓棹出嶽濟民田飲者如何清涼肺腑此語有兩負門若有辨得許你具參學眼師拈云一人理上有餘事上不足一人事理兼帶一人事上有餘理上不足唯有這僧置此一問卻較些子若是金明又且不然古澗寒泉時如何快與老僧持竹篦子來飲者如何劈頭便打且道答這僧不答這僧速道速道端陽示衆靈符一道示端陽萬法本間人自忙療病不須尋百草安心奚用覓諸方鳥啼花笑山猶靜雲散風清日更長笑看小兒乘艾虎卻將虛勢喪真常因僧請益示衆舉趙州問僧發足甚處師云賊身已露僧云雪峰師云面赤不如語直州云雪峰有何言句示人師云一不做二不休僧云尋常道盡十方世界是沙門一隻眼汝等諸人向甚處屙師云勾賊播梯州云闍黎若回寄個鍬子去師云賊過張弓保福展云南有雪峰北有趙州師云就窠打劫雪竇云這僧既不從雪峰來可惜趙州鍬子師云把髻投衙琅邪覺云衆中有云寄鍬子去埋卻雪峰若道寄鉢盂去便道盛粥飯用狂解夢見作麼商量不是僧縣手謾説學丹青師云自賊識賊乃云這一隊老賊今日被山僧據款結案縛做一團擲向諸人面前了也還有與伊出氣者麼遂拍膝一下云一狀領過示衆舉古大慈示衆云山僧不解答話只是識病時有僧出便歸方丈雪竇拈云大凡扶豎宗乘須是辨個得失且大慈識病不答話時有僧出便歸方丈雪竇識病不答話或有僧出劈脊便棒諸方識病不答話或有僧出必然別有長處敢有一個動著大唐天子只三人師云大慈雪竇可謂好手手中呈好手殊不知得便宜處失便宜新大慈這裏又且不然總不管他答話識病只是飢時喫飯倦來打眠如或未然老僧不惜眉毛更為汝等頌出風規傑出沒多般一點靈犀照膽寒蝦跳不出斗憑君作話端大唐天子只三人千古萬古𨍏轢鑽中秋即事示衆靈山指月家醜外揚曹溪話月外揚家醜隱川風味要且不然楖栗杖開花木患子白醭黑豆未生芽明月當軒挂致令精空甏徹底掀翻破家私盡情托出雖然不挂絶糧牌亦未免驚起廬山子魏鬍子背地裏商量便將二斗黃米連宵供養拈起餅云大衆只如這個作麼生消受良久云數盞釅茶茆屋下一聲長嘯碧天秋便起芟草示衆久雨初晴庭前草深為汝剷卻自快胸襟且道作麼生剷稊稗直教無影迹只留梅竹引清風示衆東熱鬧兮西熱鬧忙忙業識不知老城市山林盡炙慌獨我陶朱靜悄悄三伏之中別有秋竹風滿院誰云掃任他烈焰熾炎炎爍石流鉛日杲杲夏蟲若解識寒水鐵牛決定被蚊咬被蚊咬驚起楊岐三腳驢百億須彌都撞倒曇維那請示衆舉王荊公入寺設齋看經師云利動君子公問佛未出世時看甚麼經師云瞎端師云相公周孔未出世時讀甚麼書師云瞎公云伶俐衲僧師云是何言歟復云荊公秪解險崖奪足不知平地喫跤端師雖則就險翻身大似順朱填墨金明則不然待他問時但向道請相公高著眼他若定動不妨道又是一卷不惟不負來機亦且經義有據秪如節文又在何處良久云離婁明未徹師曠聽非聰喝一喝示衆舉西余端禪師示衆云當山僧堂漏損寮舍崩摧經年無施主燒香纍歲少檀那羞供恐有十方禪侶雲水高人暫入荒山難為駐錫可以溪山為樂松柏充飢名利不干懷飲食不為念罷參知識懶訪禪林聞説教似春風聽談禪如説夢共居巖畔同受寂寥師云進朽這裏與端師不別雖然更有一般奇特處自來千聖莫能知便起隱川大慈菴開田示衆若論這片田地從無始來人人本具號段四至毫不差誤只為當人情生智隔逐妄迷真以至惰農失業田地荒蕪甚而狡兔狐狼窟宅焉不惟輸官乏稅亦且無立身之地矣若是克家兒一見便識得自己這片田地號段四至分明決不犯他人苗稼定然起勇猛志發精進力操智慧刀刈除稗種握堅固钁剷絶稊根趁時培植而靈苗自秀及節耕耘而異草不生花開果實秋收冬藏如是則不獨輸官有稅亦且安家樂業受用無窮豈不慶快也哉秪如酬恩報國又作麼生良久云皇風化蠻貊盡唱太平歌端陽示衆師書五毒拈起召衆云是甚麼衆無語師即扯破便歸方丈示衆舉盤山云似地擎山不知山之孤峻如石含玉不知玉之無瑕若能如是是真出家育王杲云若能如是捏目生花師云若能如是踏破草鞋示衆舉古德云佛祖門風將委地師云苦説著令人心膽碎師云吾嘗於此切扶持全賴我兒孫師云有麼有麼不料兒孫先作弊師云填溝塞壑古德救時救弊不無顯揚家醜雖然還有知恩報恩者麼良久云涅槃心易曉差別智難明久雨示衆云久雨不晴衲僧無處晒朗皮草且置秪如虛空爛卻汝等諸人作麼生會復云收示衆舉洞山請泰首座茶次乃云有一物上拄天下拄地黑似漆常在動用中動用中收不得汝道過在甚麼云洞山大似將蝦釣鱉爭奈無大人相首座食到口邊被伊奪卻當時洞山若問金明但向他道孟春猶寒伏惟珍重管取洞山別眼相看亦且話行天下若作洞山待首座云過在動用中便與一枚果子且道賞伊罰伊示衆風柔日暖鳥語花香祖意教意盡在當陽山僧拄杖子適才園中散步耳畔鬧哄哄地將謂鬧市裏有甚奇聞仔細一看元來是蜂拄杖子不覺一笑便歸且道笑個甚麼百花叢裏過一葉不沾身示衆舉無趣老人與無幻和尚經行次聞風撼槎槤樹聲趣云此樹風來獅子吼風寂便涅槃幻云樹倒風息時獅子在甚麼處吼趣良久幻云大好吼即不是獅子趣便掌幻禮拜師云樹倒風息時獅子大哮吼擬向樹上聞金毛變作狗示衆舉慈受深云秪是舊時行履處等間舉著便淆訛夜來一陳狂風起吹落桃花知幾多師云山僧尋常説汝等飯也不解喫且道淆訛在甚麼處苟知落處要見他慈受也不難示衆舉白雲端和尚云若端的得一回汗出便向一莖草上現瓊樓玉殿若未端的得一回汗出縱有瓊樓玉殿被一莖草蓋卻師云大衆還見白雲和尚落處麼甜瓜甜兮苦瓠苦示衆舉僧問雲峰如何是心地法門峰云不從人得僧云不從人得時如何峰云此去衡陽不遠大慧云雲門即不然如何是心地法門不從人得不從人得時如何但云看腳下師云二老恁麼答話心地法門何曾夢見金明則不然如何是心地法門不從人得不從人得時如何劈脊便棒示衆舉僧問投子一大藏教還有奇特事也無投子云演出一大藏教又一老宿云演入一大藏教徑山杲云演出演入則不無二老若是奇特事三生六十劫也未夢見在師舉起拂子召衆云還見麼毫釐有差天地懸隔示衆舉世尊見文殊在門外立乃云文殊文殊何不入門來殊云我不見一法在門外何以教我入門來圓覺云門內語門外語師云門內門外且置大衆還見世尊麼良久云莫道無事好示衆師以拄杖按膝良久喝一喝遂歸方丈因僧請益傳燈正宗摘謬中有趙州別雪峰答古澗寒泉語峰聞云趙州古佛遙望作禮自此不答話摘云此亦傳燈所無者又云按趙州歸寂於唐咸寧四年雪峰歸寂在梁開平四年去趙州之寂已十三年矣設使趙州雪峰果是同日而有此語則應於遙望作禮曰自此不答話卻別有旨如無日字則又不止一十三年師時方旺化雪峰徒衆一千五百乃謂此十餘年中並不答話甚無著落者師云凡集佛祖宗統者須要具大知見大手眼宗匠乃能至公無遺始可矢心秉筆不然焉知有若隱若顯佛祖垂手不同及種種淆訛差別處以定千古不磨之案作後世破暗之燈乎當時雪峰趙州如風吹水偶爾成文為天下萬世則安得執死板子謂無後語可發一笑且云雪峰徒衆一千五百乃謂十餘年中並不答話甚無著落如此見解妄判古人其謬更甚又將年月文字泥為實據而集宗統大有乖於要旨則又遠之遠矣然則古今明眼宗師如大慧等拈提此案亦不少卻被塗糊俱為瞎漢可不痛惜哉今有禪德相逼不已山僧只得據款拈出也汝等大衆還知雪峰不答話底落處麼三十年後自有人在拽杖歸方丈彌勒殿上梁師以杖拊梁云久藏深谷養育良材自出山來便成梁棟今者光輝林澤蔭翊山崇衆材端拱惟尊爾躬遂顧左右云且道上梁後又作麼生香風吹四野闔國盡興隆遂曳杖云起啓七示衆一七七一銀山鐵壁一鎚粉碎大事了畢且道從甚麼處下手遂拍膝一下素弘維那出云和尚一場敗闕師瞪目視之那便喝師云已遲八刻那禮拜師打云也不得放過示衆舉無趣祖心與身語云我有為爾有爾無我本無有無端在爾生死干涉我有爾有生死爾無生死無不是我多爾纍我處也多金明閲此直是好笑看這老漢葛藤不了今日不肖兒孫縛作一團拋向人前一任揀責偈曰心身本無殊體用自分別有無俱夢幻生死如湯雪動靜不相干迷悟一輪月爾我實同途聖凡皆共轍或有旁不甘出來道金明與麼語葛藤轉不了但對他道情知你向鬼窟裏作活計示衆舉石雨和尚示衆舉鴛湖老人頌瑞岩喚主人公案云白日青天作夢夢中頻喚主人直饒惺惺喏喏也是無主孤魂乃云瑞岩是了手底人為甚他道是無主孤魂不知瑞岩過在什麼處衆下語不契復云莫道無人激發好師云惜乎我當時若在見他道瑞岩過在什麼處但云和尚又恁麼去也又云莫道無人激發好不妨云若非和尚幾乎孤負普明金明與麼道汝等作麼生還知他落處麼不然莫道無人激發好示衆舉石雨和尚參南明師翁於龍居問一念緣起無生超彼三乘權學等見阿誰緣起有生耶翁與一喝石茫然始知有做工夫事後石和尚作翁語録序中出此語真見其所得終不自欺也頌云震聲一喝絶離微徹底婆心接上機觸著頓忘三際斷炎炎六月雪花飛玩月示衆舉普明老人同雪嶠大師上弦夜看月次雪指月問云這半個在那裏去了老人良久云會麼雪云也只得半個老人云這半個在那裡去了雪亦良久老人云也只得半個雪大笑師云大衆看他二大老舉揚個事如善舞太阿終不傷鋒犯手雖然金明當時若在忍俊不禁便好拂袖而出何故聻此夜一輪滿清光何處無因雪示衆舉南明廣和尚看雪次因侍僧云滿山都是雪尚云隨聲逐色漢僧云乞師離聲色道一句尚云滿山都是雪金明既為他兒孫不敢囊藏被蓋今日舉示大衆也要各個知其落處且道當時吾師翁答這僧語為復壓良為賤為復以楔出楔試道看若下得這一語許伊具一隻眼落堂示衆結制以來又七日燈籠露柱絶消息後園竹子數百竿橫者自橫直者直咄上元示衆今夜上元節無法可與説常住兼淡薄無物可與悅只有一盞無盡真燈明如杲日寬若太虛汝等一期辛苦不妨拈出應個時節遂以如意打圓相云大衆見麼三世諸佛在此燈光裏轉大法輪歷代祖師在此燈光裏聯輝續焰天下老和尚在此燈光裏建立門戶且道金明在此燈光裏又作麼生施設試道看良久遂起身云大衆謝茶便歸方丈示衆舉楊岐會和尚示衆楊岐乍住屋壁疏滿床盡撒雪珍珠縮卻項暗嗟吁翻憶古人樹下居山僧亦有一偈舉似大衆十載金明敗屋居從教風雨懶嗟吁高枕臥勝山廬等間唱個樂餘餘祖師進堂示衆九年面壁水出高原隻履西歸苗從地起且道祖師到金明作麼生師顧左右云攜瓶拽杖著病中示衆病乃衆生之良藥所以佛病衆生病衆生病佛病咄喚什麼作病若會得此病根源不獨覓他起處不得亦非攢簇不得底説甚三百六十骨節八萬四千毛竅通身是遍身是直得絶後再蘇出一身白汗始得自在方可津濟四生梯航九有所以入衆生身即為衆生之良藥豈不快哉且道還有不病者麼嗄德山道底築牆開示山僧以大圓覺為我伽藍身心安居平等性智所以主賓互用與奪臨時不葺牆塹而自固不立知事而普堅縱有賊來窺伺無門要且覓其賊影了不可得設若迷雲障天慧日不露便見牆塹不牢道根不固未免引賊入宅以劫家寶大衆還知麼即汝六根門頭放光動地底是汝等主宰一點瞞他不得為牆為塹扶佐法門為甚不知汝既不知賊得其便即此不知底則被意賊劫汝珍寶了也乃至色聲香味觸又被眼耳鼻舌身等賊劫汝珍寶了也豈特身外賊而已哉即今汝等主宰在什麼處苟得落處無論身內身外才見賊影便好一刀兩段何故當斷不斷反遭其亂雖然汝等還見賊麼拍膝一下云或有人出來云和尚與麼道也是賊過後張弓即向他道我亦識得你端陽示衆今朝五月五划龍船打鼓道人真個貧懶向諸方賭獨存窮相手拈起越今古收拾百草頭那管甜及苦燒取一鍋湯弗論凡與祖澡浴病根除黃金賤如土阿呵呵數莫數臨崖看滸眼夫子不生魯示衆舉南明和尚住徑山時雪庭大師呈偈曰從來無物可同儕自向山中自活埋五十年來踐履事娘生一隻臭皮鞋明答偈云既云無物可同儕誰向山中誰受埋五十年前娘未養喚他甚麼作皮鞋師云山僧亦有一偈舉似大衆遂拍膝云不是物兮不是儕重巒卓出絶煙埋自來忘卻年和月剛晒階頭破草鞋示衆今朝六月六貓狗盡洗浴人家裹餛飩金明攪麩粥非是矯世孤天然不同俗掀翻三藏經不將口來讀好摘火中蓮徑栽石上竹清徹絶比倫別有頂𩕳目忽思田舍翁如油爊炙肉報告出家兒毋虛度此伏佛誕日示衆摩耶腹內善哮吼一出頭來便見醜人無下賤賤自生至纍兒孫不唧溜漏逗鎮州普化翻筋斗佛誕日示衆衆作禮師云今日釋迦老子露頭面時節好與一杓惡水喝一喝云賊過張弓維那一喝師便打歸方丈那隨入師云你喝老僧喝世尊那云寧可截舌不犯國諱師亦打分餅示衆舉無趣老人分餅次云道得即與老人與麼垂慈大似量小金明則不然道得與一枚道不得與一枚且道作麼生一僧云某甲慚愧師云與汝一枚僧請益師示衆云須是恁麼人始知恁麼事大凡禪家語録一出如隨色牟尼珠使仁者見之謂仁智者見之謂智讚嘆及毀罵皆歸第一義近觀一等不知皂白便乃胡言亂道真不識羞耳昨某孫鹵莽書至老僧一看中説老僧有失撿點處恐防後患不測所云順治問木和尚一則機緣傳訛之甚不覺絶倒老僧與士大夫應對機語具在録中辛丑冬一日偶與曹司農閲弘覺北遊集上問參禪悟後人還有喜怒哀樂也無弘覺云逆之則怒順之則歡老僧見此暢快之甚因曹云和尚如何老僧云不是喜怒哀樂所以古今拈提俱向得意處別出手眼無非顯揚箇事若道不合應答恐防後患只如雲門為佛兒孫拈佛初生云我當時若見一棒打殺與狗子喫貴圖天下太平亦不合下此語耶汝等作這般見解錯會古今入地獄如箭射莫言不道
