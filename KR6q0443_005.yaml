body:
  text: 嗣法門人真璨真智仁旭真照編拈古舉迦葉初祖一日踏泥次有一沙彌見乃問尊者何得自為祖云我若不為誰為我為法眼益云我當時若見拽來踏泥五祖戒云迦葉與沙彌說得道理好洞山价云莫要茶喫麼保寧勇云雖然如是傍觀者哂師云這一隊漢總被老頭陀拖在泥裏輥何故將頭不猛帶累三軍舉六祖謂門人云我卻歸新州汝等速治舟楫門人云師從此去早晚卻回祖云葉落歸根來時無口五祖演云祖師恁麼道猶欠悟在師云五祖與麼道淆訛在什麼處舉安國挺禪師因僧問五祖真性緣起其義云何祖默然挺侍次乃謂大德正興一念問時是真性中緣起其僧言下大悟徑山杲云未興一念問時不可無緣起也時有僧云未興一念問時喚什麼作緣起杲云我只要你與麼道師云正興未興則且置只如五祖默然還答真性緣起也無若道無負他五祖若道有為甚其僧向挺侍者而得開悟試道看舉歸宗常禪師因普請乃問維那作什麼那云拽磨宗云不得動著中心樹子那無對保福展代云比來拽磨如今卻不成法眼益云恁麼則不拽也師云拽磨已竟舉斷橋和尚室中示萬法歸一一歸何處凡下語不契即趁出高峰於此打失眼睛師云斷橋老漢固是婆心大似教壞人家男女高峰大師雖然於此打失眼睛恩大難酬金明要問大眾且道如何是萬法歸一一歸何處月似彎弓少雨多風便下座舉僧問長慶眾手淘金誰是得者慶云有伎倆者得僧云學人還得也無慶云大遠在高峰云或問高峰只向他道阿誰無分僧云學人還得也無但云猶嫌少在師云金明則不然或問眾手淘金誰是得者但云妄想不得僧云學人還得也無答云莫向我覓舉僧問佛日弼禪師如何是毘盧印弼云草鞋踏雪僧云學人不會弼云步步成跡高峰云忽有人問但言文不加點云學人不會但云要會作麼師云高提祖印還他二老爭奈錯下名言金明或問毘盧印向他道你問我答云學人不會但云狼藉不少舉雪竇示眾云客從遠方來遺我徑寸璧中有四個字字字無人識佛鑑云中有四個字不必重拈出高峰云中有四個字字字無平仄師云三老拈提四字轉見糊塗未免烏焉成馬金明不惜眉毛特為諸人正訛去也遂展手云中有四個字逢人莫錯舉舉應菴和尚舉世尊初生及雲門語乃云雲門此話雖行未免落他陷阱黃面老子末後賣俏正是依草附木二俱不了以左手拍禪床云過這邊著汝諸人還知明果落處麼珊瑚枕上兩行淚半是思君半恨君師云舉此話端實是好笑三老漢用盡許多氣力直至而今抬他不起且道他是阿誰遂拍膝一下云祖禰不了殃及兒孫便下座舉僧問茱萸如何是沙門行茱云行即不無有覺即乖其僧後到洞山舉似問山如何是沙門行山云頭長三尺頸長二寸師云或問金明如何是沙門行即與踏倒舉百靈和尚一日路次見龐居士乃問昔日南嶽得力句曾舉向人麼士云曾舉來靈云舉向甚人士以手自指云龐公靈云直是妙德空生也讚之不及士卻問靈得力句是誰得知靈便戴笠子而去士云善為道路靈更不回首徑山杲云這個話端若不是龐公幾乎錯舉似人雖然百靈輸他龐老一著何故當時若不得個破笠頭遮卻髑髏有甚面目見他龐公師云等閒看來彼此暗藏春色仔細揀點大似橘皮作火魚目當珠驀拈杖顧眾云要知得力句太遠在舉羅漢桂琛禪師與長慶保福入州見牡丹華幛子福云好一朵牡丹華慶云莫眼花琛云可惜一朵華師云三尊宿撥草瞻風則不無若是看華直似不解何故只為說黃道白金明當時若在拽杖便行舉古德赴一俗士齋次德問參禪念佛是同是別士云識得是同不識是別師別云和尚今日不著便古德大笑不齋而去師別云山僧今日失利乃拈云當時此老大似不解作客勞煩主人俗士將成九仞之山猶欠一簣之土卻被此老一坐直至如今起身不得簡點將來二俱不了且道全主全賓一句作麼生兩段不同收歸上科代古達磨大師因梁武帝問如何是聖諦第一義磨云廓然無聖帝云對朕者誰磨云不識帝不領悟代帝云遠臨不易趙州因殿上過乃喚侍者者應諾州云好一殿功德者無對代云和尚合禮三拜趙州上東司召文遠遠應諾州云東司上不可與汝說佛法代遠便好度一籌子趙州問座主所習何業云講維摩經州云那個是維摩祖父座云某甲是州云為甚麼卻為兒孫傅語主無對代云家醜不可外揚趙州見婆子攜籃過州云那裏去婆云偷趙州筍去州云忽遇趙州時如何婆近前打州一掌師云敗也雪竇云好掌更下兩掌也無勘處師云雪竇只解助強不解扶弱趙州問僧什麼處來僧云江西來州云趙州著在什麼處僧無對代云久嚮和尚南泉一日牽牛入僧堂內巡堂而轉首座乃向牛背上三拍泉便休去趙州後將一束草安首座面前座無對代云賊過後張弓趙州與文遠論義云不得占勝占勝者輸餬餅州云我是一頭驢遠云我是驢胃州云我是驢糞遠云我是糞中蟲州云云師別遠云某甲輸與和尚看這老漢通身手眼不得動著餬餅僧問趙州如何是不錯路州云識心見性是不錯路師云且道心作麼識性作麼見雲居送褲與僧僧云自有娘生褲居令人問娘未生時著個甚麼僧無語代云卻被和尚看破頌古經題不是以字不是八無毛大蟲戴雙角鐵眼銅睛失卻威鎮州普化搖鈴鐸世尊拈花末梢拈出禍生芽一笑頭陀自著枷將謂密傳正法眼靈山若個不知花黃龍三關我手何似佛手當下自分妍醜縱饒伎倆十分蝦跳何嘗出斗我腳何似驢腳擬議便遭一踏當人直下知歸趙州橋是略彴人人有個生緣壺中別是一天漁父慣會打鱉農夫偏解種田三不是不是心佛不是物抖搜不下為人徹一陣金風赤骨涼攜笻卓破莓苔石興化打克賓虎解起屍貓能插血正法眼藏瞎驢邊滅僧問無幻和尚如何是提婆宗幻云一字不著劃僧云某甲不問這個幻云圓相不著圈一不著劃圓不圈鐵獅吼過海門前奼女已歸霄漢去癡人猶戽夜塘泉無幻和尚燒火次僧問如何是自性天真佛幻云與我搬取一束柴僧搬柴了又問幻云這奴子好惡也不知便打大富須還長者家天然到處有生涯可憐瞎漢不知寶錯過栴檀作野柴牛過窗櫺邪法靈驗正法難扶牛過窗櫺笑倒子湖百丈野狐甜瓜徹蒂甜苦瓠連根苦百丈野狐精泥牛趁石虎中邑獼猴佛性垂慈也不妨獼猴內外太郎當若非寂子超方便開眼明明入鑊湯古德喫油餈正賊喫油餈邏贓甘受屈賴有個莊主將謂別奇特僧問金明如何是虛空髓師便打突出難辨的拈來信不欺掀翻四大海擊碎五須彌女子出定是定非定因邪打正女子瞿曇急急如令僧問汾陽如何是祖師西來意青絹扇子足風涼祖意明明絕覆藏覿面全提如不薦通身難免汗澆湯趙州過殿白日閒行殿上過趙州父子轉模糊堂堂一殿好功德叵耐無端臭氣污瑞巖喚主人公獨逞家風老瑞巖自呼自應恣盤桓惺惺將謂無相識莫被人瞞轉不堪僧問竹篦話師以水滴桌上云道得鐵丸自易化道不得滴水也難消僧擬答師云不是不是背觸俱非驗作家鐵丸滴水又添沙明州城裏憨布袋卻笑佳人弄木蛇馬祖三十年不少鹽醬綱宗一振闢尋常倒握龍泉魔膽喪鹽醬從來不曾少鷓鴣啼處百花香德山托缽托缽回庵話不堪巖頭密啟更無端末後句會還難拋出當陽仔細看乾矢橛稽首雲門乾矢撅虛空逼塞幾人知擬將淨穢分臧否赫赫皇天定有私臨濟再參黃檗黃檗付禪板臨濟將火燒國清才子貴家富小兒嬌僧至曹溪問守衣缽侍者此是大庾嶺頭提不起底麼者云是僧云為甚在上座手裏者無對師代云逢人切莫錯舉畫堂雲靜日遲遲簾動風微山影移識得曹溪路無別逢人切莫亂針錐行實主峰上座設普茶同頭首執事等請師行實師因病不允眾復致懇師乃云夫出家者當正因出家正因行腳如是庶不負父母生我身師友成我志耳余乃嘉興人姓張父號舜甫母賀氏好善放生夢睹日輪乃妊余生於萬曆壬子十月初九日辰時也自幼不樂兒嬉唯喜近佛僧外祖賀銘菴公無嗣繼余六歲習學至十七訓詁為業常持大悲咒志慕出家一日過街坊聞婦人語脩行出俗事余即感歎我為丈夫漢反不若女流之志耶遂書偈辭親棄室遍訪諸善知識看個父母未生前本來面目話二十三歲參本師鴛湖老人於桐月庵即蒙垂誨余不覺汗下復求開示即欲追隨老人入閩因事乃止住吳門禪院讀楞嚴半載無有入處一日聞室人病故則欣然曰我事成矣尋回桐月遂禮老人之系萬如和尚剃染命掌庫事理務之暇刻究本參略有少怠即自責云出家所圖何事耶便廢寢食危坐數炷香亦不覺尚見云常住事不顧如深山裏土地作麼便打如是提挈轉增疑悶自恨福薄障深痛發苦志嘗私立七日限討個下落處斷不肯向故紙上卜度拾人涕唾及莽鹵承當日夕唯是一個話頭默默提撕常被動靜二境打做兩橛戊寅歲禮密雲大師奮志請益重蒙賜棒未決疑情後因庵中脩造勞極足患水毒三月不起彼時盡把從前識見一齊放下如未斷氣死人一般一日侵晨忽聞匠斧斫大木聲有省直似網羅中跳出乃述偈云父母未生前佛祖也難宣木馬追風急泥牛吸海乾呈尚尚頷之一夕侍次尚問如何是你庫頭事余云絲毫不錯尚云你問我余云如何是庫頭事尚云件件分明余遂頌云絲毫不錯件件分明兩個八兩元是一觔一日余看雪次寒劇問眾云寒則普天寒為甚面目不懼冷眾下語無愜者余自代云秪是蓋覆他不得尚聞之即命侍者請入方丈云你何不問我余即理問尚云我只要他出氣余亦頌云蓋覆他不得只要他出氣鵓鳩樹上啼意在麻畬裏辛巳開堂余掌書記期畢隨至建寧尚入普明設齋請老人陞座旋至曹山料理院事聞老人過福州天寧余即謝事奔候叩問起居老人云不須更問山中事觀著容顏便得知余便禮拜老人命坐理人事留歇足旬日忽得黃海道書復回曹山時值酷暑患痢幾絕得祖山福生二禪師湯藥幸存殘喘未幾即辭尚擬歸禾省親結茆養病時一初法弟同過建寧入普明禮別老人復蒙留住一日命余入室纔跨門老人云是甚麼余擬答老人震威一喝余即契悟遂掩耳而出一日老人欠安命余衡石一初三弟兄茶次老人云汝字覺先喚甚麼作先余云且喜今日得自在老人云如何是覺後余云請和尚尊重老人云你還分得先後麼余良久老人便喝余云某甲只管喫茶老人云如何是喫茶底事余云柿棗腐乾都在這裏老人云你作麼生余云卻被某甲一口食盡老人云滋味如何余云甜者是甜鹹者是鹹老人云未在更道余云某甲謝茶便禮拜老人深喜一日老人索余二人末梢頌余云絕後再甦事縱橫殺活時聖凡俱罔錯獨許老胡知呈老人閱畢二人擬出老人云兩個瞎驢向甚麼處去余彈指一下便出又一日老人集眾乃舉拂子云世尊拈一枝花老僧舉一枝拂且道是同是別余出禮三拜歸位老人云這瞎驢遂擲下即將從上源流衣拂并書法偈云沿流一段事竟無頭與尾付與獅子兒哮吼滿大地授余余見老人為法諄諄種種囑付義不可辭再拜而受年三十一歲也一初法弟一時隨付時雲峰法兄主寺不幸老人逾月謝世理後事至癸未春抵武林謁石雨和尚於寶壽具人事石作佯狂勢余即近前呈書云師兄有書請和尚鑒石云是誰余云某甲石云面目如何余與一掌石舉書云個是甚麼余拂具便出少頃石復請茶余入作禮石云元來是鴛湖和尚法嗣余云適來曾相觸石乃大笑揖坐余敘事請老人語錄序遂歸嘉興尋老人受業地於興善寺承馥師堅留度夏復得白生法屬慇懃款於靜室是秋舊疾復作奈有徑山觀音殿朗玄主人等致書恭請為眾結制余不能卻負病強赴入山掃無幻祖塔一日過雪嶠大師千指庵坐次余云大師庵前好山水嶠云老僧終日看余云東坡池上石崚崚嶠乃命茶敘先老人同住話又一日嶠他出還山有僧問嶠云獅子出窟即不問到家一句是如何嶠便罵打出其僧復問余余云打水與老僧洗腳僧禮謝余亦打出明春解制遂赴餘杭之廣福寺住靜一載是冬馥師主東塔院事請余首眾期畢掩關堂左編次普明語錄乙酉春聞國變即啟關復至興善靜室避居至冬應鍾溪太平庵請及祇園寺共住兩載丁亥秋至禾城掃無趣祖塔於敬畏庵日明耆舊并諸法屬延憩數月乃受武康天池山請住未久山寇復起遂辭歸禾受諸護法紳衿闔山耆舊請住金明是戊子仲夏也復承諸檀信竭力護持致得城市山林之況不覺住此廿有年矣院雖淡薄喜有衲子相聚以不負先老人所囑為幸前歲有禪者索余說行腳數次矣余自念無補法門不欲露布醜拙今值病中汝等三復致請余不得辭略述始末以塞眾望伏唯珍重眾禮謝
