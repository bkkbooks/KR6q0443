body:
  text: 住嘉興先福寺嗣法門人真化等編偈頌五言律贈張恆所醫士曾受醫王囑深棲桃杏林千般枯草料一片活人心指下定生死機先按古今丹爐煮明月赤土變黃金哭鴛湖先師法門何不幸大廈忽然催落月誰能挽遺風莫可追憶恩深痛切睹蹟轉傷悲令豫失依怙翻思沒一詞和無趣老人參禪偈三首參禪覓玄要終不明妙道拋卻自家珍更向外邊討頭頭意地行物物胸襟擾何日歇狂心當下一時了參禪莫執坐隨事忙閒做處處盡生機法法皆顯露使得十二時盤旋八角磨日用不留心驢年也弗悟參禪真妙訣只要話頭徹莫謂佛祖疑貴在生死切等閒一覷破稱錘元是鐵撒手上高山踏破澄潭月壬寅夏送主峰都寺歸淮立事須當早為人貴老成謙光深有益養德重無爭揭起頂門蓋露出鬼眼睛此日炎炎地途中仔細行端午日日是佳節頭頭現本光不知榴火熱便覺艾心涼煮石堪為供烹泉聊作漿山中無監曆勝世有端陽癸卯八月示羅子先居士五秩法名真性真性起天命心靈蚤已知謙光無以尚隱德莫能施蟾桂愈聞遠幽蘭益見奇淨居香滿座頑石展雙眉訪黃坡蔡子穀居士清秋動野思撥棹訪君廬路僻驚鷗問山遙破浪舒盡溪觀古致就燭讀新書令我幽齊榻烹珍帶月茹春日即事簡掃菴談司業春晴鳥語碎雲淡露天涯盤礡松門古茆茨竹徑賒山寒苔裹石林暖蝶穿花不覺思樵路經行日易斜五言絶句金明古蹟六詠檇李亭檇李傳誰氏溪頭更立亭自堪香味別千載憶枯櫺范蠡湖泓水何清徹名賢尚隱蹤傾心時鼓棹栩栩越仁風天封室腐楹重整立闢土露針錐碑砌茆簷下真風未易窺一擊軒竹密餘蒼翠乘軒事可追帚邊聞一擊不失兩行眉獅窟蝸涎成古篆空谷賴殘顏叢樹參天碧曾無毛異還龍潭珠吐危樓畔波騰雉堞陰臨淵情未已風冷動幽吟示徒學道本無難知羞心自安莫將輕放過徒取面紅看又識得知非處偷心何所安頭頭皆是道玉石不相瞞夏日口占赤日炙耕牛田衣挂樹頭蓬門常不掩竹室冷如秋示乞食敲出虛空骨結取世外緣鉢盂開口笑個個要周全天巖天生巖自高峻嶒莫可上我獨杖其頂群峰悉相向東巖東巖尤且孤突兀依山戶常被老僧嫌推窗日輪午警策佛法本無多因循便錯過六根俱顯現觸處別無他又急急莫蹉跎光陰焂忽過憶時小兒戲今又白頭何心空及第虛空撲落盡渠儂總不知豁開頂門眼露出珊瑚枝本地風光笑傲日悠悠從來絶外求經行及坐臥何處不風流現成受用耳朵兩片皮牙齒一具骨熟睡到天明洗面摸著鼻漁釣盡寒江月披蓑煙雨深錦鱗才入手不是等閒吟樵慣入虎狼穴梯雲樵轉幽只知泉石伴那識有王侯耕翻轉劫前田生涯到處全倦來無別事放倒钁頭眠牧放下鞭繩了牛兒方始淳一腔短笛後驟過緑楊濱湖上步月皎皎無倫匹湖頭深夜行橘皮猶未製白水咽香清口占瘦竹庭前徑幽蘭石畔舒明明西祖意不會更何如聞人自欺拈偈策之明珠産老蚌白藕出淤泥清淺一湖水遊魚何自迷除夕兀坐卓然真人間作故新春雷連夜發全露法王身移竹喜爾操有節亦且得虛心自豫親手植慎初成茂林廛居即事徑幽苔地滑門靜竹風寒車馬曾無跡惟聞鳥語歡與世高上座獅子窟中事善哮吼者得今得本無得無得得亦得七言律金明即事范蠡湖頭影草枯百城連落入清波斷碑橫岸堆蒼蘚截壁分煙挂紫蘿盤曲杏松巢鶴瘦凌空樓閣老僧多扶笻笑看忘珠者擬索池中五色螺壽石雨和尚擬師之壽不尋常何物堪能為比量雲縱丹山看消長風翻碧海探溫涼虛凝浩蕩乾坤永塵淨經綸日月長演盡無生咸妙協森羅齊拱法中王重陽送一初法弟住院次來韻九日霜華特遞來行行令我脫襟埃多年室掩秦溪默一旦光搖濮地開麈尾乍揮黃落木錐頭才卓緑凝苔喜君不棄連枝惡永正淳風過狹垓答汪玉水居士還家韻荒郊若個肯還家舊業從先不屬賒韻起墨花閣名驚昔夢句生東雅堂名動人嗟城煙斷處維摩默巷月輝時顏子誇豈似未歸流浪客相攜林下草深遮廛居偶爾從緣得敝廬何期城市有山居六窗扃碧塵煙淨一戶常開車馬稀接巷絃歌咸妙道隔鄰雞犬總玄機廛居莫謂無幽趣黃獨深煨香又肥題雪牛懶擎頭角隱林泉徹骨冰姿絶影鞭吼斷青山眠夜月吸枯滄海臥晨煙無心香草從他異有意藍田疑自偏漫道牧童收不得一陂寒色倩人憐酬姚自先居士次來韻廛居弘蔭勝青山曲徑苔封野衲閒折拄杖拋蠡水畔破芒鞋挂雉城間愛培疏竹影蕭寺喜對喬松日啓關兀坐蒲兮忘歲月何期垂念道風還蠡湖放生何緣舌味起貪叨作盡傷心殺活燒蠢蠢不知循業至靈靈爭昧本因招慈開死結三祗釋悲放生冤萬劫消快看飛潛縱林壑自承恩處總逍遙答天游駱居士來韻士之祖復齊公為車溪法門昆季祖業荒殘尚有墉七穿八穴顯真宗野翁曾示青緇讖趣老剛遺車復蹤澗底水狂猿弄月嶺頭雲淨鶴鳴松蠡湖獨坐無聊賴何幸知音一擊鐘示法燈祖印祝髮一入緇門喚作僧形骸𢬵捨好拳膺離塵須要離生滅斷髮還當斷愛憎微細威儀宜謹慎幽玄妙道莫粗矜從今刻志超前轍擉破皮燈即法燈割愛辭親到我林勤行行業要純諶偷心死盡方堪指惡習全除始可針印破虛空為祖印心融塵垢是真心一朝僧相非輕易猶入紅爐百煉金壬辰春與掃菴談司業話舊拈贈先師底事灼然彰舊案拈來意更長著作堂前輝化日普明寺畔雨秋香一溪煙水人難測滿苑光風劍不藏愧我匪才成懶癖幸逢佛法有金湯壽文節法師并賀重建真如寶塔行藏六十絶偏圓獨步高風鴛水邊慈影已彰欣草木法音恆震利人天香飄薝蔔千秋業花擁真如百世緣一段春光鋪地錦長年此日更鮮妍壬辰夏贈海鹽覲周徐居士用費隱和尚韻先聖儀容固可涼潛行密用賺諸方見超今古人難測道絶形名不易量生滅未忘情自異盛衰才論實堪傷可憐滿地滔滔者帶纍毗耶愁斷腸次韻酬仲璘徐居士慧華香噴出林前透石穿雲非小緣海上揭開春暮月齊頭全露夏初天珠回玉轉忘情用武緯文經不昧傳轟地一聲雙眼碧驅邪還幸握金鞭天池退院酬淡菴潘居士韻春雲冉冉揭巖扉卉木樅然隔世非新月帶梅扶嶽出晚霞和鶩泛湖歸明堂文質來清韻古殿幽閒照紫微幾度光臨愧何似素風搖竹步依稀壬辰冬同右文摩雲子先新在衆文學居士過隱川插草即事病骨扶橈度隱川風霜凜冽亦堪憐短蓑才褂桑枝上破笠剛懸鋤影邊一個瓦鐺烹隴月半間茆舍拾蘆煙自來只為荒田地博飯謳歌答衆賢示舒中上人入閩用韻子為何事入禾西幾度擔囊扣我扉棒下知歸猶是鈍言中領會未堪齊若能爆地一聲斷始可乘風千里棲莫謂山居便無作也須相喚食莖虀癸巳春子先昆季請觀梅拈贈每對清姿便解愁秪因春色有根由雙雙共氣情真異朵朵連枝意自幽碧幹光搖擎麗日玉葩韻競醒昏眸芬芳庭際誰知己疏影橫斜香噴樓答吳秀才來韻兩度霜風撲面傾殘林若處脫然清危樓破格披煙露老幹扶疏帶月擎就局門舒人氣爽通津路滑浪波平滿庭黃葉天成現一鑒高明非色聲回院自慨揭開古蹟示初因力挽頽風已九春自喜陳綱彰有目卻悲荒院繼無人少林面壁尋知己船子拋綸為錦鱗肝膽一時俱裂破陶朱公里石頭蹲秋日口占城市山林幽且靜蓬門永晝掩芳菲喬松未許閒禽宿勺水頻添赤鯉飛石塌蟲吟蘭萼秀竹窗風淡豆蔬肥草堂獨坐日當午自剪煙霞補毳衣甲午春喜遠門禪師見謁拈贈憶昔福城宛不同誠如私意出群雄吸乾滄海燈燈焰踏斷煙霞脈脈通洞濟激揚光化日主賓互換振家風欲言懶癖衷腸事盡在相看一笑中示卜右文居士五十疇昔經綸翰史功今朝更不與前同陶然半百知天命呱地全彰繼祖風無影樹頭雲挂彩不萌枝上日初紅湖邊滿座輝珠玉笑看丹青入畫中自述自知髭白起腮邊惹得空花笑大千懶向滄浪探珠玉老來廛市守山川家風孤冷渾忘歲祖席重輝亦待年人事不關搔首處滿林松竹鎖寒煙詠梅素心冷淡越精神逸世孤風不異真瘦骨櫺櫺扶皓月清臞落落出紅塵香飄斷碣驚殘夢韻起空山惱亂人自笑煙霞千嶂外一枝獨占上林春梅下有蜂頌碑贈蔡子穀居士用來韻潦倒弘深護法王高林絶巘莫遮藏赤心布地雲門子瘦骨擎天金粟香拼命驅邪驚閃電橫身扶正凜冰霜誰知具有無欺眼共助金明破院涼金明佛閣雪月燈次古韻三首若處林亭一夜無寒光燦燦是銀壺才思古德盆成句又睹楊岐床滿珠勢壓萬煙排玉嶂平鋪千澗繞冰湖樓頭興起誰能共六出翻飛擊野鳧一燈懸起黑雲無四壁輝煌映寶壺光徹昏衢彰斷喝影垂暗室露真珠鰲山人佛陶朱里火樹天仙范蠡湖此夜一期千古勝光明照曜宿蘆鳧夜閣塵囂闃寂無嬋娟窈窕出晶壺楹簷繞砌連城壁林卉均嵌耀乘珠遍布靈山標月指潛光繡水浸天湖憑欄自喜披衾玩長嘯一聲驚起鳧丁酉春朱欽臣居士請看梅即事裴西古苑展丰神物物陳前致趣真巖畔步來無俗客溪邊訪得總幽人寒香縹眇渾鋪雪疏影徘徊絶點塵竟日書齊談道話更聞枝上鳥爭春贈徐完愚居士五十法名真果樅然佳景好徜徉更有奇觀不我藏鴛水渡頭輝寶日鶴洲林外駛仙檣漁歌時聽臨崖草野色遙看隔岸芳莫道懶傭無物贈卻將閒事作商量羅子先居士請看梅即事丰標挺徑轉精神一度相看一度真兩樹交加藏達士半庭俯仰可畸人美哉見色非千色羡爾居塵不是塵排榻坐來時供茗暗香浮動石頭春答三宜和尚時講法華經法苑凋零賴有人寒巖煦日展陽春雲門堂奧恢猶古長水波濤翻更新斂鍔吹毛全殺活高懸毒鼓絶疏親何當陋室飄香至一朵青蓮映水濱施約菴居士五十二月風光特地新知非蚤已卓然真浮華力挽行藏古朴素堪垂節操淳法苑金湯聲歷歷儒林砥柱色璘璘更持一脈維摩旨桃實分香海嶽春戊戌夏住敬畏菴步周居士韻百城環座一殘林古佛家風不用尋糲食充腸聊展鉢惡衣遮體恰無心未聞瓜熟論甜苦那探渠成別淺深自喜春山秋水處殊非知有莫知音戊戌臘日回院見庭梅被殘示衆久植空庭望蔚然何期運歉病堪憐枝殘還有新條發幹老寧無瘦玉鮮淡泊韻敲情更惜蕭疏風冷骨猶堅斷碑野叟時同晤不覺仰噓月到椽即事示徒寂寞山中事可嘉肯將真實博虛華蜃樓易得人情悅蝸屋難逢智士家草載寒暄親試隱千年風月若為嗟如松之操誠然別得到湖頭且喫茶己亥秋壽談司業七秩才聞芳桂擬何知剛憶東君初度時香韻不踰方自樂風清所欲恰神怡毫端瀉出碧天氣研底挨開明月池鄙野總無羊犬贈聊呈隻手笑鴟夷元旦雞聲二首陸元度文學請獨占元聲莫可爭轟然由此發機生詎因德感驚人夢猶且靈鳴醒物情宿草銜恩酬未足臨風披意語初呈朱翁絶唱聞堪頌音韻還應仔細評且喜年朝鼓翅鳴信乎德備起群英自聞臘至承君放始覺春回賀聖明慈轉殺機因莫重仁離庖慘得非輕最初一句誰能和試聽窗禽答太平慨時嗟見秋林鮮老成不求妙悟不求精金剛衣底何曾煉寶鏡塵中孰為明著意閒花違法式無心照燭逐風情最憐一等飄零者鐵棒臨頭作麼生癸卯春送主峰首座重整三塔寺慨古悲今必自強行難行事始相當奮回法社風塵地力整僧堂戎馬場一語維持山鎮永八荒傾動日遍長龍淵幸爾重拈起糞火堆中道更香禱雨戒殺禱之久矣復何詞慘酷聲號誰反思樂意觸神招大旱縱心殘物誤非時燒枯業海慈龍現炙倒情山悲雨施願得世間存少愧莫愁無雨不生粢廛居一等山居出市廛豈圖大隱作生緣種瓜得豆引溪上刈草成蔬傍屋邊飯後欲茶閒掃葉課前排榻謾垂簾更看明月來窗白鈍钁高懸取用便示耕即事丙申仲夏豫解蠡湖院事抵隱川示耕尋月挂笠枕流頗有村居之興旦暮朧間翛然獨步不覺咿唔偶成十二章非為騷人捧腹特以舉似耕耨不孤道行云爾村居莫道少相資物物分明不我欺百合香芬桑底玉日葵花放隴頭姿螻鳴壒𡒁開心眼蛙鼓池塘醒夢岐自得個中真境趣何勞數墨透牛皮盤曲桑蹊儘可資黃花翠竹總無欺插鍬處露祖師意剷草時揚古佛姿牧笛風吹賡別調樹標月影接多岐茫茫未解村居事徒使人開兩片皮落落生涯為我資色空明暗詎相欺三間茆舍超塵境數畝荒丘産玉姿栗棘蓬中無鱉鼻平原地上有驚岐但拈鈍钁耕雲石莫管叢林分髓皮籬編木槿本無資成現拈提絶自欺處處犁風牛顯跡村村梅雨地生姿窗前林鳥偷園果檻外行舟問水岐博飯栽田真受用爛泥刺破腳頭皮半衲襤襂滿鉢資繩床土凳有何欺泥垣蜂砌玲瓏壁甕牖花穿瑪瑙姿百草頭邊宣妙偈一竿影上指訛岐誰知王老無情思挈挈東村鐵面皮蝸廬活計不多資鈍钁橫拈驀地欺秕稗直教畬斷種荊蓁那許岸萌姿恆翁曾示慚知義沮溺嘗藝羞問岐緇素一般歸耨處幾能著眼脫毛皮大幻人間非幻資獨憐於愛憎猶欺桃溪日照翻紅雨荻浦風清捲緑姿地臼舂梁留故客豆掤排榻展新岐相忘抑有不如意水浸黃麻爛骨皮野僻荒陬莫解資滿川風月若為欺良苗莂去爭先翠異卉栽來越外姿塍小接溪橋過柳村深連市駕無岐攜詩車水憑欄詠更打癡蠅鐵嘴皮道從本立盡生資才見安閒便有欺時雨失栽禾缺美晴空怠刈豆無姿屋邊蛛網重重布場畔蚯泥岌岌岐一自入鄉行化後山清水緑快人皮挂笠軒前頗有資何須他處覓緣欺破砂盆貯隱川水無底籃盛美石姿爛煮瓜蔬懷抱甕香吹芽茗點疑岐更看繞燕喃喃語一種生機非地皮道業森森何所資及時幹辦始無欺蟬啼落日犁輕病鵲噪歸林耙瘦姿遍地蚊雷尋血漢一溪螢火照昏岐休云白飯難充口愧殺通身換肉皮連宵雨足啓晴資造化生靈信弗欺一片嫩禾青倍色半灣新月碧添姿舟移岸上萍填洫魚躍田中水沒岐且喜桑陰堪晚眺落霞飛處影皮皮新霽喜逢新霽起村隈茅舍家私盡打開折拄杖挑川上草破蒲團晒隴邊梅窗掀素練飄玄路衣洗清風揚緑苔更看佳禽惜毛羽樹頭飛去又飛來古體和南明師翁十究竟究竟身四大繇來非假真萬象之中剛獨露堅密維持正法門究竟心泥團打破絶纖塵仔細看來無所用普天匝地是何人究竟事日暖月涼皆分處鳥啼花笑各呈奇物物頭頭只這是究竟理穿山透石何堪舉等閒踏斷那鄉關東土西天通故里究竟生萬般緣起不無根庭前花景非同夢白髮嬰兒即古今究竟老磨盡春秋豈曰小時攜竹杖坐當軒驀示兒孫問家寶究竟病覓他起處渾無分假饒攢簇不得底爭似苕溪行正令究竟死藤枯樹倒原何始當知觸目是菩提富貴貧窮幾如此究竟苦幸然灶裏有煙火端的不在黃連枝如喪考妣曹山墮究竟樂赤腳波斯戴雙角相逢好笑又驚人萬慮千酬惟一錯和達觀大師夜行偈晝夜經行時自能步步起前步不及地後步又摧起後步若不動前步如何起前後不相及騰騰起不已以此諦觀之足何嘗履地足既不履地空水乃可履空水既可履說甚神通具破衲歌蠡水家私無別物剛剛只剩破直裰通身細碎費成文受用無窮何可說這皮袋沒遮蓋破補襴殘無內外零零落落好風流一顆圓明終不壞領尚無寧有帶繩牽線結驢駝載穿來那論重七斤披向人前真可怪此毛衣何堪賣這般滯貨有人愛皮穿骨露許誰知東擲西拋始是快風又吹日又晒佳賓懶顧誠瀟灑等閒為褥更為氈糞掃堆頭償夙債識因果知利害針線不牢若有代任他笑我太癡憨隨地飄搖無罣礙寒暑來實是賴出入山林光體泰常將篾束住巖隈衲衣下事恆不昧仔細看絶無對錦繡伽黎豈同類襤襤褸褸總堪憐非聖非凡觀自在阿呵呵眇眇乾坤雲靄靄苦雨歌春風春雨竟忘日隤落椽檐滿地濕可憐敗屋轉離披東拄西撐誰為葺足踏地頭頂笠舉意欲行還復入倦來忽聽數聲鳩瞪眼煙雲忙習習無限春光風雨過贏得溪濤洶湧急掩柴門幸無客這般蟲豸為標格緑樹陰依折腳床筍芽穿破梅苔石偶拈禿筆胡亂揮分明個字難書擲難書擲笑倒虛空暗裏藏擬欲參詳霄壤隔知足歌和子蕃朱居士韻物我無殊真自足隨之順逆非同碌翛然個裏一壺天舉世幾能獲此福等閒事事賣肝腸猛虎何曾食子肉歲月消磨沒短長山中卻有松花祿體上煙霞雲霧衣豁開獨露頂𩕳目石女垂垂髮似絲圖畫虛空偶成幅逍遙世外非人間豕鹿同行復同宿這段風光本自然從緣恰寓破落屋破落屋風雨承渠覆几案絶香塵剛懸一祖軸日常無別者置卷懶翻讀相逢相喚喫杯茶那管浮沉榮與辱手卷卷舒皆自在橫放總悠然佛祖從渠轉流芳萬古傳芒鞋鼻孔遼天耳門卓朔踏斷塵寰高挂壁落斗笠超然一道具無物可同儔每每蔽風雨常常掩日頭竹杖天姿挺特節操迥出扶傾輔危機用莫測縛帚客來訪懶叟面垢三五斗住院已經年無錢置苕帚樹葉風卷堆塵沙時疾走家親但覺貧那解當處有籬傍足生緣拈起便哮吼誰謂般若體未免墮窠臼堪笑老趙州憐兒不覺醜過嚴灘弔子陵釣臺巇嶮兮千峰擁座巖灘浪滾兮一派清溪迥絶功勳兮名超列士晦跡潛光兮聲振古今數珠頌示人顆顆圓活眼眼通神會得途中受用不會且自規繩聞舉子先居士德行至德不德大行何行偉哉偉哉因邪打正次韻酬高五采文學曾聞諸法從緣起玉趾何期過蠡水僧俗之交已有秋羡君佳景無憂矣攜笻話舊髮成斑兒孫滿座真且喜稱意逍遙秉燭遊清池修竹豈徒爾楓葉霜華得幾時人生百祀猶彈指捧讀瑤篇自赬顏恐負喬松蔭這裏
