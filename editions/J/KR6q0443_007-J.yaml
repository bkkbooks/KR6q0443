body:
  text: 門人永修真凈真琦性嚴等編佛祖贊釋迦文佛萬德洪名不必論普天匝地盡埋根老漢意孰知恩蠱毒之家水莫吞彌勒菩薩灰頭土面笑咍咍布袋橫拖要打開衣破襤殘渾不顧獃獃只等個人來觀音菩薩古釋迦不前新彌勒不後惟有這老婆卻是較些子湧渤海波濤於桑隴之中坐洛伽山巖於隱川之上垂頭接引側耳思惟無字經置之高閣破沙瓶且得施為只是不合賺他善男子傾心合掌善女人露膽獻珠驚起紅嘴白鸚哥或翔或集無有定期咄好與三十拄杖時有傍僧云忽有人出道這個老和尚予即向他道只一杯茶少你不得併書以供養又若愚法孫請放下蒲團兀地打坐賣盡風流淨瓶插竹這些心事許誰知幾片白雲又飛過又身雲法孫請輪珠蒲坐淨瓶楊柳示拯沉溺方木圓竇且道是天竺觀音為是普陀大士咄蝦跳不出斗又陸元度請亂艸堆頭揭開肝膽清泉盞上橫放楊枝試問元度居士是何意旨道道關中觀音老漢之慈悲非心所測非口所宣予又烏能贊之哉但不違我願成就我志恩莫能酬且道伊在關中作甚麼一張木几一爐香獨坐蒲團竟日閒出海觀音復禪人請聞性既滅音性亦空能所雙泯唯顯其中隨類應機罔不圓通咦洪濤說法何人委又使鶯啼到綠叢飛來大士周摩雲請大士慈悲豈唯巖竇童子鶯篁卻成漏逗笑殺傍觀門外走初祖達摩見貴則價重娑婆遇賤即分文不值驀頭撞到范蠡湖聲聲唱出無平仄有平仄剛對君王道不識咄又九年面壁弄巧成拙當時不遇神光看他坐到驢年也轉身不得若是忤逆兒孫一拳打倒這老賊又隻履西歸忒煞之遶叵耐宋雲漏逗不了蔥嶺風高月皎皎天封佛慈禪師橫拈楖栗繼起圜悟綱宗倒用鉗錘直接祖照弘範開創嘉禾范蠡湖上放蜂採蜜大坐華頂天封寺裏打鳳羅龍及乎五百載深藏忽爾一旦時揭露冤無頭面目既彰債有主遺蹤莫睹咄道是佛慈老漢之風規卻成千古鈍置之漏逗無趣老人三笑耳聾雞鳴眼突頭長如泰山之頂迥乎莫攬鬚眉若凍嚴之雪凜乎難窺范蠡湖打草驚蛇敬畏庵開門放賊且道阿誰無趣古佛又鼓翅雞鳴起野翁於福城院中驚蛇打草接車溪於范蠡湖上斷佛祖之命根以吹毛瞎人天之眼目作榜樣而今高揭金明寺裏一任腳下兒孫拾乾屎當栴檀為供養題祖幀圖三塔主峰長老請梅雨初收晴川歷歷一片清風迥絕塵跡主峰主峰何得無事生事特特請我祖孫父子作麼今既到此你且燒香供養我為問候趣祖默然幻祖云我今日事煩南祖云我今日勞倦鴛師翁云今日不著便我乃大笑云一個頭若玉巖作大獅吼眾獸腦裂外揚家醜一個眉清目秀與賊布梯破家蕩產冷煖自知一個面如滿月慣賣死貓昨日賺錢今朝失利一個骨瘦如柴拈隻折箸撐天拄地更有一個無面目漢敲骨打髓討甚麼碗汝住龍淵已數年也行難行事將此破家私乾屎撅麻三觔一時漏洩不獨令人瞻仰取足輝映于四方矣設若有個忤逆兒孫到來又作麼生切切無幻和尚擊碎驪龍珠翻轉祖翁田地跳出猛虎穴收得原本契書裂破面皮煆佛祖於雙徑橫拖泥水定棋局於車溪這個老和尚從來不識伊顧左右云還有識得者麼道道又雙徑峰頭拾得契書鴛鴦湖畔翻轉田地打開棋局滿盤不容搶行奪市爭奈一著落在金明手裏咄只許老漢又搶奪行市半盤棋局打開撥草衝關秪為難逢敵手碎佛祖窠窟祛眾生械杻振起斷橋作大獅吼謂是徑山和尚又是車溪老叟南明和尚秦溪掩室幻翁跌足於關前雙徑指揮雪嶠呈鞋於座下明頭合暗頭合佛祖罔措殺人刀活人劍孰敢當鋒自非久炙巾瓶而烏能蹈其高風耶又這個老禿中車溪毒不肯懸羊頭且要賣狗肉慣作死馬醫將佛慧命續致令後昆贊毀莫及夫是之謂人天眼目又面如月心似鐵直指人口無舌黑竹篦驀頭楔陳葛藤和根截個是阿誰車溪嫡血鴛湖先師豎法幢兮建溪山頂理頹綱兮鴛水湖傍滅正法眼藏兮雙徑剪邪見稠林兮獅岡橫拈楖栗端坐匡床繼懸絲之慧命啟末劫之津梁且道是誰傳臨濟正宗三十世普明老和尚又這老和尚在徑山檢故紙獲得些子便向異類中行披毛戴角顛三倒四換卻天下眼睛金明忍俊不禁揭示當軒喚侍者快燒柏子薰伊鼻孔何故雪屈雪屈又主峰上座請這個老漢平生別無所幹隱遁山林數十年家風零落從天判禪者參尋白棒當頭按臨濟綱宗斷橋公案撞著忤逆兒拈來俱坐斷分付主峰揭起令人看自贊湖州柏山素弘理長老請一莖草上現丈六金身是甚麼乾屎橛更打圓相作女人拜呈拳進前拂袖退後要相見也大難直饒喝上梵天撲下來亦未向紫羅帳裏撒真珠在是何面目問取蘭若理夢堂倪請通身沒形影遍界絕遮藏覿面無回互薰風徹骨涼夢堂夢堂又安可以累兒孫半滿偏圓乘獅象家醜外揚弗弗徽州璨首座請這漢絕無打算隨緣應度或慈或喜或瞋或怒把爛井索穿卻佛祖鼻孔將折木橛擉瞎人天眼目作大闡提入無間獄為甚如此問取東巖首座揚州既白旭上座請個阿獃甚古怪質拙性粗心直口快偏不入錦簪花且向寒爐著炭了人天宿債幾坐道場累破上牢漆桶推倒我慢高山扶起天封石塊接斷橋之源出車溪之派橫身不顧泥水之拖帶魔窟虎穴之利害直饒胡漢齊來管取一時捉敗旭首座汝既知不須家醜外揚自有清風下載炯西堂請咄哉癡老年登半百猶不知命喫瓔珞粥全提正令賺他千指龍象蹴踏范蠡湖頭力挽澆漓之病這般面目那堪為末劫之大柄炯西堂切勿效伊如此之道行主峰法請倒用橫拈全提正令就裏一機不通凡聖獨坐當軒更為誰峰高聳出天涯淨高峰淨名雪子上座請耳側腮邊眉橫睫上不善韜藏露出模樣有時高高峰頂擊響敲空有時深深海底無風起浪及乎金明冷坐一十二載惡聲遍布幸自可憐生豈堪更與天下人瞻仰莫莫性侍者請咄哉老漢通身是病袖裏金錘斷人性命倒用橫拈維持正令巍巍堂堂佛也難近為甚更有這個𠰚我住天池及蠡水提瓶挈杖曾親證阿呵呵休錯認斷橋水長少室風峻江西源書記請一雙冷眼青白相半踞坐匡床觸事而斷剖萬劫之訛定千古之案豈容末世魔魅之胡亂是以直指迷途寒光烜煥何似秦時𨍏轢鑽呵呵今既落丹青之手一任瞻之仰之呼驢喚馬於松岫峰頂之畔琳維那請胸中沒個字佛手驢腳棒頭有隻眼醍醐毒藥是非不到處千聖也難摸琳維那逢人切莫舉錯清湛二上座請這漢初無隱匿全沒準的不論親疏貴賤相見一味粗率有時十字街頭嘯月眠雲有時孤峰頂上喝驢趁馬有時搭黃衣提陳爛之綱有時拈白棒整荒殘之席招佛祖怨結人天賊如此為人笑破諸方唇吻安可起模畫樣作後昆之標格清監院湛知客快把付於水火之中免得大家殃及真禪人請臨濟一隻箭斷橋一口劍袖手不善藏端坐露方便露方便白日青天轟閃電八萬四千摩尼珠撒向閻浮見不見慧侍司請遊山千年松下有茯苓堆蘚石邊有毒貨老僧既到此不妨與說破將謂目視雲霄翹足而墮殊不知澗水響潺湲兩腿酸如醋咄一片白雲又飛過快拿拄杖子來莫要坐此賺他描摸青天箬帽大圓監院請看你這個臉嘴宜乎貶於隱川之上負钁披蓑栽田博飯示耕室得一種生機掛笠軒有無窮趣向咄但肯歇心同話會不堪賞處也堪賞項牧公居士請康熙甲辰元旦眉罅突雙睛鼻端垂兩孔剛拈楖栗杖聖凡俱罔措謂是介菴鏡裏求形謂非介菴水中撈月唯牧道人乃知源核無限春風吹八極一輪新日上孤峰咄廬山中峰湧蓮鐵輪法孫請描不成畫不就更說甚麼頂門眼正肘後符靈若是跨灶兒孫定不外揚家醜呵呵秋月隱川曾命事春風又欲上匡廬楚黃石丈法孫請文殊三處度夏老僧三處過冬道同迦葉擬擯道別石孫請訣面目甚分明當陽難掩拙為汝遠來隨侍安可與之饒舌咄棒頭滴滴是鮮血溫州靈峰法孫請心潔勝月骨硬過鐵這個阿獃佛祖罔測年來老大不善藏又累兒孫揚醜拙且道是何面目咄咄金明監院請世尊說法四十九不曾說一字矢上加尖金明出世四十九唯袖手兀坐加尖矢上若以語默動靜邈摸其行儀何啻天壤哉汝不我欺皆當作佛隱川監院請這老禿奴終日哆哆啝啝胸中一字也無不特他人不識自己不知者乎钁頭邊相逢鈍置不論是佛是魔更使問法問道安可與之如何若何居常雖無侍者眷屬匝地寧有親疏針劄不入匙挑不上卻向無措足處婆娑與麼不與麼且道是毒藥醍醐若也道得猶在半途其或未然破沙盆也要人扶隱川一陣清風起黃葉飄飄不較多速禮三拜呵呵覺禪人請驅耕夫牛揚良馬鞭便恁麼去且見一邊不恁麼去猶隔三千畢竟如何乞我一文錢如侍者請這個滯貨賺斷主顧不落聖凡端坐冷舖笑倒諸方欲隱彌露倘遇其人定然勿肯放過咄明心戒庵主請咄哉這老漢肘後懸符眉間掛劍是聖是凡一刀兩段卻來鴛水之旁示大悲心隨類化現還有知恩者麼鶉衣披起坐木榻白拂橫拈為阿誰看看三塔主峰長老請癸巳寫我形丙午重乞贊屈指十四年看來都不像自己尚不識云何為人樣呵呵今且坐三塔起廢席于兵燹場中整頹綱于馬糞堆裏不論是佛是魔殺人不眨眼將軍也須倒退萬里何故自從胡亂後三十載不少鹽醬先福別傳長老請老白拈人叵測面目甚分明睹伊沒影跡隱顯以時喜怒不一駕斷橋而橫亙宇宙摠教度驢度馬灑鴛水而瀰潤乾坤畢竟成苗成實惟別書記具那隻眼知我之律請題供養乃示之云何必易贊大哉古羲初無言說肇開混蒙惟此一截畫破太虛七花八裂消息既露是誰甄別文王周公孔子三人證龜成鱉題陸欽華居士行樂法名真和探玄探妙猶非究竟入佛入魔亦非分外擬欲徹法源底更須向萬仞崖頭撒手一回通身白汗始得慶快切莫坐在山窮水盡處賺他攜籃負钁採得靈芝自為足矣咄個是阿誰題項別駕小像裴休請黃檗安名長髭求石頭點眼今日牧公乞金明題像這三個漢不論是緇是素好與三十拄杖何故𠰚松下石邊橋流水響題錢子無居士小像身披衣頭頂笠手攜笻腳踏屐昔人行處不能藏卻把春波漫陶澤相看更問擬何之四事分明為君擲咄題淵若師小像獨炤堂請神清眼活髮冰霜齒密耳聰貌古蒼持木患坐石床此是九九翁之行藏吾欲贊之言辭荒願師溫飽獨炤堂還將散步於篔簹題張道生居士像從來不相識纔見便禮拜視之信有餘聽之情未解白白一臉鬍黑黑雙睛帶遽坐擬思誰張公喫酒李公醉咄試問道生居士李公是何面目與人緣而無礙柏山素弘理長老像寶如法孫請這風顛漢慣捋虎鬚誰知我正法眼向這瞎驢邊滅卻柏山峰頂呵佛罵祖坐斷天下人舌頭山東寶孫請歸法源供養不是好心將刀斧斫不開底面目揭示大眾還見麼切莫覷著覷著則瞎咄又身雲法孫請一莖種草親為記莂蘭若芬香柏山結果將父子不傳之妙死貓頭扶起破沙盆能縱能奪能殺能活夫是之謂行解相應名之曰祖今身孫慇懃請贊其師朽不知伊何劫中結此冤家又殃及祖禰也呵呵法語授素弘理上座達摩西來不立文字惟以直指人心見性成佛可大師斷臂安心盧行者黃梅踏碓以至臨濟喫三頓痛棒棒下兒孫焉用文字耶己丑春有舊識理上座參予金明刻究此事眉毛撕結已數載矣今辭去乞予數語正所謂不是冤家不聚頭耳偈曰直指本無說無說說直指今付直指時直指直指旨與祐上座今名真倪欲識佛性義當觀時節因緣今病僧出山住個破院秪為普明先師有未了底公案所以與他了卻不意有個祐上座撞入金明覷見轉轉不能了也且道作麼生了偈曰妙道本無傳無傳真妙道無傳今亦傳無道道亦道示啟上座達磨西來唯直指教外別傳不立文字以度眾生若假異方便接人祖道安有今日哉嗟夫近世有稱宗屬者衒耀見聞鮮務正行斯皆由識見不超宗眼不正致令識者笑徒自欺耳故佛鑑云若有一物所好則被外物賊矣蓋吾禪家貴乎眼目正當唯露些子如石火電光如金剛王寶劍如踞地獅子令人湊泊不得除非知有莫能知之若能如是綿密操履無絲毫透漏方可拈頭作尾拈尾作頭不妨孤峰絕頂十字街頭十字街頭孤峰絕頂驅耕夫之牛奪饑人之食矣如皋啟上座參諸方有年茲中夏參山僧於金明丈室咨決大事及禪暇尚有餘習未盡終累大德山僧常呵斥之一日翻然覺躍然起再拜余前乞示名字遂名之曰真啟字之曰天巖意望其卓出情量迥脫蓋纏則不孤負一生行腳也切囑切囑示文上座自古迄今這一著子明如杲日寬若太虛無絲毫隱蔽纔涉思惟則白雲萬里所以二祖得之不往西天玄沙得之不出嶺德山得之見僧便棒臨濟得之見僧便喝吾普明老人得之孤峻二三十年顛三倒四而時人莫測山僧親遭毒手得來今十載矣然無一日不挂肝嘗膽也且道山僧為甚麼事思之思之示敏上座欲明恁麼事須是恁麼人若是恁麼人何愁恁麼事昔臨濟大師建立四料揀四賓主四照用三玄三要等令人一一明了一一透脫方能得自由分可以自利利他隨處作主遇緣即宗如獅子遊行不求伴侶壯士展臂不借他力淮安敏上座不遠千里參侍山僧已半載矣今辭去且要山僧鼓粥飯氣山僧有時恁麼有時不恁麼有時不恁麼中卻恁麼有時恁麼中卻不恁麼汝可知之更有一句他日為汝說破示智上座諸佛出世祖師西來為渡迷津直指人人本有不從外得亦無一法可傳授於人若謂有法可傳授是外道法非正法也所以古德云若以實法繫綴人土亦消不得山僧這裏與先聖不別亦無實法與人亦無迷津可渡且道佛祖既無法與人將甚麼為直指渡迷津耶咄癡子面前切莫說夢示豐上座末法垂秋古風掃地余嘗思老趙州之遺蹤自住金明十載孤冷時流驗盡茲祖巖上座維揚人也有志於道前歲八月至雖參諸方有年尚未肯休歇余時扣叱之忽一日呈行腳稿余目之曰你到處有許多絡索因甚到這裏一點也無答云不須錦上鋪花余云漏逗漏逗渠即禮拜余喜其老成遂書偈曰獅子叢中驗克家生擒活捉絕周遮末梢一句無多喝慧命懸懸露爪牙徽州汪朝奉子瑜乞示甲午秋山僧過峽石田道耕齋頭古上座率子瑜汪居士參請堅志苦心備呈所解乞示法語山僧迫不得已為汝葛藤一上夫參禪要訣貴在猛捷大丈夫若於此事信得及認得真一刀兩斷千了百當那有許多禪道佛法商量今日三明日四依依稀稀若信若不信總為戲論何能得自由分先聖一切語言皆藥病相治豈有實法與人耶如云即心即佛非心非佛不是心不是佛不是物又云有時教伊揚眉瞬目有時不教伊揚眉瞬目有時揚眉瞬目者是有時揚眉瞬目者不是且道他意在於何無過為人抽釘楔解粘縛也子瑜居士留心此道二三十年不為於般若無緣但當時被邪魔中毒深遠一時卒未能撇得閨閣中物耳卻把種種纏縛二境所牽打作兩橛不能了斷較之鹵莽承當實雲泥矣然亦不得死執影子絡索自苦山僧要居士將從前所有之物盡情撇下冷地裏看看是個什麼意旨若了得去那怕甕中走鱉果得自由田地山僧為汝助喜何如與施約菴居士余與居士機契夙昔因緣而患祖道之微力挽真風一十四載此實乘願再來非同小遇時義不容隱特授以老人杖子為末法宗眼偈曰傑出古人風昂然勢莫窮本無言語道縱奪為流通師見元卓日持經咒拈示看經須透旨持咒要明心咒心不明故日持總無益經旨不透故縱看亦枉然經旨果能透牛皮也須穿咒心豁爾明雲山別一天不見道海底泥牛啣月走巖前石虎抱兒眠鐵蛇鑽入金剛眼崑崙騎象鷺鷥牽若也會得其中句能縱能奪能殺能活好喫老僧一日三頓拳不然逗到臘月三十日閻羅老子與汝打算飯錢莫道不言示禪人一度相看一度了法法頭頭勿草草弔月吟松我不能拋綸擲釣何可曉自知沒用日閒閒那管諸方風浩浩禪人若肯伴寂寥佛法身心俱靠倒俱靠倒珊瑚枝上目杲杲書問與葵石朱郡伯昨承過晤惓惓為道貧衲不勝欣躍向曹秋嶽居士屢頌老居士大有根器要貧衲與居士眉毛撕結究明箇事為法門之柱石貧衲素蓄於懷昨得詢及工夫承備述留心乃云無門可入貧衲云喚什麼作門居士於此悟得便是入門處更無異路又聞日課經咒及諸務作障若以貧衲觀老居士根器不凡固當直捷提持猶如金剛王寶劍一切斬斷自能隨處解脫何有一物為障哉且喜近聞有人與居士盤桓甚善但不宜泥於文字增益解路閉塞悟門必須屏絕塵緣看即今自己安身立命處念茲在茲久久純熟忽然㘞地一聲得大自由得大安樂為近世士大夫之光明幢是貧衲之所願耳與福建普明思達監院禪流沿習時風不古老朽痛念於斯因病體深愧不能還山然無一日不在紫雲峰頂也每懷吾姪苦守多年真見歲寒松柏設若獅蟲魔種不顧先聖遺範竟將常住物為己有早變了也去冬得吾素穎上座歸細述顛未益見吾姪堅操苦行自不被邪魅所惑耳老朽本欲還山與諸姪相商個事奈有常住脩造卒未遂願特命素上座主之萬祈吾姪痛念祖父道場更為輔弼成就法窟永護主持法門忠孝盡始盡終而吾姪斷斷乎不可離此山也切囑切囑外祖衣一頂汝師所遺前歲秀雲送至金明老朽意俟一人杳絕影響今與素上座帶歸普明供養不致匪人竊負矣其藏經語錄板時當揀點不令散失山門幸甚餘不盡言與一和尚己亥十月廿一日妙峰到金明知吾先師道場實賴思達姪苦守以俟吾弟兄入山之切近來想其歲久情疲乃有傍觀之隙又得吾妙峰聞之頓起悲痛之思不辭數千里險崖之峻又至陡門遭擄罄劫雖則赤體歸家喜其恬然絕無難色可謂法門忠孝良有以也然某極欲過嶺奈諸病絆身不克遂願惟望吾師弟不吝慈悲為法道故非惟與先師法席重光亦俾妙峰一番苦心及閩中諸姪有賴矣某稽首江干臨風把臂為贐耳與項牧公別駕法名真本昨談有公案未透過在胸次有物快將萬緣放下與朽盤桓嚼鐵丸飲洋銅過日子其鐵酸餡金剛圈栗棘蓬無不百雜碎矣何更許他囫圇吞個棗耶但辦肯心必不相賺無慮無慮又佛祖之道誠非細事真大丈夫方能擔荷也觀居士為道殷勤不棄寂寥常至蠡湖刻究此事可謂智過諸方矣前日因緣你居士近日何如病朽昨遣侍者來看為甚你居士不在家中速道速道復田道耕居士病中維摩居士以疾而臥五祖以瘧喻示人不意居士又落此圈闠也適讀來翰以知足力未佳望當更宜珍惜為法自愛病中十詠閱之頗佳亦可消遣耳承惠謝謝復周蓮齋法名真潔節讀來教已知為道殷殷所和蜜蜂頌頗佳中有不到處過在錯用心耳如教有云昨蒙和尚以本分事錐劄奈某雖究心有年日在影響裏未能㘞地一聲所以極力欲道道不著之語深見居士虛心請益然貧衲不欲與改正者正要居士用一番真實苦心參究那個蜂子忽得一劄冷汗通身自知痛癢徹頭徹尾豈不慶快平生也哉
