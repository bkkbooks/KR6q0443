front:
  text: 序佛祖密室中有一段因緣從來無人覷著何故覷著則瞎秪如臨濟興化父子授受源流有據諸方但以化得三聖大覺力而拈臨濟香更有謂臨濟不傳興化而化在三聖大覺處悟得先師喫棒底道理後拈香臨濟蓋僭嗣也若此妄鑿古人何異矮子觀場今諸子云從上佛祖皆見有付法偈既已刊出燈録何至馬祖下不刊亦復不見法偈為是無付為復珍惜不彰咄黃河三千年一度清汝等冬瓜茄子見箇什麼雖然憫子誠懇不得已即將佛佛授手祖祖相傳源流法偈機語隨録頌出輒成一帙敢曰公諸天下萬世明眼報佛深恩知佛祖授受之有的據益俾德勝無焚衣之悔耳還見正法眼藏麼一隻破草鞋無底亦無對秀州金明寺嗣祖沙門悟進書介庵禪師語録序臨濟之道今所行於世者惟斷橋雪巖二枝雪巖之後代不乏人至昔天童密雲大師而盛斷橋之後亦代不乏人至今金明介庵禪師而顯余觀禪師住金明二十餘年一衲數椽蕭然自適體和而恭情約而素履務實而志嚴不為譽喜不為毀怒不為身親不為物疏視末俗之夸耀紛爭不啻倍蓰余嘗得一再見私心儀之謂有古人之風茲而牧公項子及諸同學皆久事參訪深明法要於師服勤不替特切皈依雲集輻湊之侶咸能普師之化遍於諸方諸方因師之化追斷橋之烈永臨濟之傳於不孤師之功不可誣也維師抱德而彰故逃名而追其住金明與先住徑山等處上堂入室拈頌諸篇大慧覺範舉無以加嗣法門人為刻十卷公之當世余岐而二之乎余曾聆師之教而欣服之因敢以管蠡道其萬一或者以儱侗罪我其文奚辭後學施博拜題諸鄉紳請啓伏以高懸法印拈花啓不立文字之傳直指真宗折葦唱與汝安心之旨一隊老古錐弄死蛇而解活千年陳骨董觸臭氣以如新以至化被人天良縣道窮思議雖禪學於今為盛然孤高傑出者誰恭惟介菴大禪師座下派衍滹沱脈承鴛水上振斷橋倫祖之家風數百載而洪力肩敬畏趣翁之公案咫尺間而近林下水邊久潛道用湖濱范里大鍛聖凡全機施設英靈漢匍匐歸降赤體提持門外人皈依乞命唱出無生雷音普聞於海內備揚家醜道眼卓絶乎諸方斯真末世之津梁法門之柱石也默等向沾法味素飫玄談固宜金明作略遐邇皆知猶恐威德韜藏趨蹌或後伏願慈悲一切毋論已到未到盡與肺腑清涼徹底為人不問明頭暗頭咸令腦門迸裂使野干盡吐狐涎湧出當空杲日獅王不行兔徑果然世躋平康臨楮曷勝翹企懇切之至法末談貞默曹溶張晉徵吳鑄莊鏻朱茂時錢江戴長治汪挺李丹衷沈閎劭何元英許宗渾朱介曾王孫嚴勳姚原溈徐李熊吳源起項謙金大起黃士傑同頓首拜介菴禪師語録目次序啓卷一上堂卷二上堂卷三示衆卷四小參卷五拈古頌古行實卷六機緣問答垂問卷七像贊法語書問卷八偈頌卷九詩偈卷十疏引序跋針銘佛事附源流頌一册
