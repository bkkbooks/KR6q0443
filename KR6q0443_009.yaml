body:
  text: 嗣法門人真範寂曇行璸真源編七言絕句示當湖陸永侯文學法名真修覿面提持四句偈明明歷歷不曾藏閒忙著眼看端的山谷木樨香又香示鍾溪晉侯葉文學一句時中密密參從緣逆順自相便驀然觸著寒毛豎始信真宗別有傳喜願菴禪師過訪苔封小徑絕塵囂賺我同人破寂寥話到水窮山盡處舌尖端不動纖毫示折蠟梅玉蕊霜花傍壁披一枝橫亞最新奇清香打動鄰家鼻引得遊蜂不識時示子先羅居士七日枅窮非等閒羨君聊識面門斑更須會取祖師意莫向人前道易難懷餘杭余棲雲居士曾參南明師翁於雙徑雙徑因緣羨未忘尋源徐步冷山房不嫌懶僻時相候又入雲深插草揚寄朱清遠居士幾度荒居意不堪松山頓闢擬茆庵雖然未遂君嘉志亦可將題作指南慰約菴施居士病中好肉生瘡少有胎通身痛癢出頭來血膿膿地親殃及莫怪當年流毒材偶成幽勝不離當處有市廛古寺即山居成群松鼠偷瓜荳拍手不回加兩噓示瞽者舂米慣舂老米足堪誇椎下分明是當家糙白不將雙眼驗唯憑赤手作生涯出閩題江郎石江郎三片絕囊藏何代安名亙古揚插入太虛星斗落清暘雲霧總風光和陽明先生良知韻剔起殘燈午夜時巖阿冷暖自家知自知不向他人說知與無知是阿誰知與無知是阿誰天池月色幾人知莫將光影認為是只管區區向外為酬右文卜居士法名真仁情塵覷破密參玄奕世金湯蠡水邊慚愧僧家無可報披毛帶角被人牽酬欽臣朱居士阿誰多口遞裴西且喜知音不我欺雪裏桂香須委悉幾翻覿面已全提摩雲周居士乞和放生偈𨍏轢居士韻溝渠爭識江湖闊慚愧古人徒折攝飛潛乞命略拈提各各試看是何物末劫眾生恣迂闊貪饕殺味無拘攝佛祖洪開解脫門急須跳出釜中物酬中瓚施居士募醬那事明明不露文一湖鴛水一湖雲三年鹽醬承君力沾著唇皮箇箇欣拽磨磨輪轉處洩天機手眼通身吼似雷玉石總教成作粉中心端不動纖微懷祖山福生二禪德古今密行有人作彼此皆施無緣慈翻憶曹山危病處煎湯送藥五更時示繡雪巨石石頭巨細分明了驢腳精麤見也麼趁此早年強壯力汝師公案莫蹉跎癸巳曹太僕鑒躬居士過院值余病中勸飲陳皮湯拈偈奉酬抱病荒廬誰起憂幾經風雨涕寒流高車何幸垂殘榻一盞橘皮徹體休箏放去收來一鷂箏撩天撲地為誰生雖然不食腥羶食也使林間鳥鵲驚示獅吼孫愚鈍也知忠烈後破鐺須信舊家聲忽然突出頂門眼獅子吼時野干驚留宦維那麤食敝衣堪禁足危床土凳可安居金明不是老興化留擯分明意莫躇答徐敬可居士次放生偈韻仁能大施放生湖業債從前不較多未釋箇中關捩子明明開眼入湯鑊破寺傍通一蠡湖古今賢達放生多雖然池小堪容活但願慈興出沸鑊丙申觀音誕日出山即事飄然拽杖入深村疊疊春光一個僧自笑蠡湖成底事驢腮馬額得人憎鷹俊哉不打籬邊鵲劈海擒麟霄漢飛啗啄一聲狐兔盡新羅又過鐵牛機因士持紙求示白紙從來沒一字云何要我更塗煤病僧無力難拈筆卻負當人捲玉回示磨粉炊糕急急揩磨潔白心鑊湯爐炭上親蒸名模脫盡香甘美好奉公婆也未曾掃鴛湖先師塔昔日普明遭熱喝今朝興善禮慈容塔前松柏青青候匝地光揚少室風笑不成兮哭不成綠陰黯黯鳥嚶嚶兒孫濟濟咸瞻仰肯負單提折腳鐺示眾飽腹經行非分外虛心請問是工夫夜來八萬四千偈不會依然在半途示羅子先四十一聲㘞地出胎時兩手划划更有誰不惑年來報恩處因行驚起睡貓兒禮虎丘隆祖塔咄哉睡虎擬何酬賺殺兒孫笑不休三拜更添遶一匝山悠悠處水悠悠風鈴頌一出紅爐便有聲高懸樓閣轉光明因風直示簷前事未審何人聽得清讀易形名未具孰為庖一畫纔彰便落爻底事明明人不薦咬蓍嚼字夢中敲啟華嚴會齋單雲壑禪人請重重嚴飾雜華林童子來參意更深托出滿盤咸妙供好將阿字細沉吟火炮頌錐劄曾經毒手來靈機一竅頂門開等閒觸著無明火裂破虛空震九垓偶成萬物盡從時節換不知時節任誰行空齋極目閒消遣長嘯一聲天地清夏日面水一杓清泉堪自足通身受用無窮福枕簞蓆椅俱抹過尚餘惡水好灌菊慨古笊篱撈盡千秋月糞火煨空萬古雲近看大都皆滯貨奚嫌黃葉亂紛紜翫月芒鞋踏破千山月拄杖伶丁唱妙訣木人撫掌笑呵呵石虎咆哮跳出穴示徒息諍二首理深何必形聲色見淺徒勞論是非謾道老僧無料理一條白棒活人機但得境閒渾是道莫愁濁世有邪魔消歸自己皆堪用不必尋求過與他即事栽梅滌竹野人風掃盡繁華眼界空更有一般堪羨處數聲幽鳥綠陰中示病中痛痒於身便謂災那知罪福不無胎快將毒藥還醫毒膿血盡時好肉來贈斷愚姪掩關吾孤汝負不須陳三應三呼定有因總是老婆心甚切管教槌破鐵崑崙示雪宗悅眾莫將命蹇便自屈妍醜皆從密行修若具趙州清白眼騰蛇改格未為憂贈金居士送子出家裴君送子有多偈公送云何無一言夜宿隱川看新月層層花影到窗前決當行此勿因循報佛祖恩一句陳千古英名留後望莫教錯過太平春酬文節法師過訪象駕何期過隱川重重鋪錦菜花天慚余蓬室無相接一盞蒿湯桑隴邊周摩雲居士求偈隱川室裏留君宿敬畏堂中示再參舉手低頭頻顧語莫云無法為人嫌無禪帳即事水國蚊雷觜如鐵赤肉團邊咂鮮血誰能於此契生緣歷劫無明當下徹喜劍安法姪禪師即事本色住山非染造為憐塵世覺心寒和煙入水超方便明月蘆花孰解看示東巖上座九上三登未是親一言契入始為真從今收拾瓢囊也他日分明舉示人立冬即事敝衣重補足遮寒日臥閒雲敗屋寬黃菊數枝喬木下飄飄落葉許誰看勸斷愚法姪啟關凋林欲挽正斯時何必拘拘俟滿期放出從前真面目移風易俗好施為冬至曉雞纔報一陽生凜凜霜天梅蕊擎舊案日新輝宇宙焚香撥火不虛行示項牧公別駕法名真本維摩之疾好承當痛處何妨炙艾瘡眼正心光扶祖道任教烏兔起滄桑示古巖知客金明寺裏鉗錘處范蠡湖邊赤骨肩但辦肯心追古哲不須巖外更栽蓮除夕一爐猛火度殘庚豈與諸方鬥富行茶罷各歸寮舍煖現成公案到新正入新方丈酬曹秋嶽司農無知老衲累秋翁明暗相參兩眼紅居易昔年遺十笏又承新整定西東示範維那鼻孔撩天意可投叢林踏遍已知休從斯放下身心後蠡水風清款款酬自娛幻住不須頻計較隨緣放曠得安然任他為佛為官去我只破廬枕石眠答曹秋嶽司農五百年前未了因深埋塵土得無親曾思坡老完經事此案重圓須舊人寄禪人三頓因緣不用猜當機只貴眼睛開金明不是閒饒舌鈍斧重拈期再來示陸緣度居士法名真慧靈鷲峰頭一點因自來蠡水日相親而今既得本來面萬紫千紅不是春示淨名雪子上座末法垂秋正此宜莫嫌窮谷少人知脊梁硬豎半撐拄自有香風撲鼻時贈羅又先文學武略文經非偶然家聲祖父又爭先筆花滿案咸珠玉且喜高標不浪傳上元和無際祖師走馬燈原韻附團團遊了又來遊只為無人指路頭歇卻心中三昧火刀鎗人馬一時休一點無明遍界遊只緣不識這毫頭誰知盡力跳不出息卻心中火便休示淨道新戒人馬團團奮迅遊英雄豪傑孰回頭若能覷破影中事好示傍觀歸去休示牧愚新戒師垂語云時當酷暑大地火燃語默動靜莫能逃其燎卻汝等如何免得羅子先答云更嫌何處不風流師頷之遂示以頌更嫌何處不風流猶較炎威過一籌未得個中三昧力行人卻與路為讎壬寅春仲即事有引禪林澹泊素讓金明此亦自甘外緣不務況值歲歉信施尤難然喜眾皆孜孜為道第愧無法供養秪得豐儉隨家寧獨篾束三條而已乎為法忘軀信不誣充腸藜藿把屍扶驀頭撞著庭前柏肯放靈山老禿奴貧頌參禪學道學先貧徹底貧來道自親果是赤貧渾是道試看誰是赤貧人瓔珞粥幾顆玉粒綴青薺滿缽橫挑香更肥翻憶荷衣松食輩只憂無法不憂飢佛音尼在羅子先家作鞋次忽聞樓板聲有省居士即開空室勘驗機緣呈師師以古德接尼悟道頌韻示之大似吳山老禿奴權開空室接師姑果能不負孃生面自出群中一丈夫示夢菴書記離鉤三寸子須道相逢慎勿妄盤桓頭頭公案雖成現漠漠煙霞仔細看示空有知浴頓空諸有撈明月誰灶無煙沒夜光收得海中龍藏寶翻身索價有人償過楞嚴弔紫柏大師阿師半偈理更殘始得叢林復壯觀此日往來發長歎抬眸又覺苦心寒示身雲法孫柏山惡辣誰能近汝獨相依事有年言行無違成就汝更加戮力絕狐涎示朗上人最喜山禽不亂鳴一時叫出一時聲聲聲相喚誰能醒面面青山面面青庚子八月朔旦為范大夫受戒偈引大夫為金明伽藍今受五戒已竟此不忘靈山授記誠非夢事正如徑山之龍神鶴林之米老然大夫之為伽藍又傑出矣偈曰霸業垂成即泛舟豈圖血肉念無休從今受戒登壇後永佐金明第一籌瓦做得工夫成一片方堪大冶煉身堅莫嫌此是路傍土偏向毘盧頂上眠樹燈偈示慧峰八十壽一樹燈明亙古今森森枝葉佛皆欽當陽直示無偏黨鑑地輝天意轉深示衍法華維那試看誰能轉法華念翁撩起事堪誇何期子擬追蹤者撇下湖邊也克家示佛心火鑊鐵丸居常飯刀山劍樹自家園可能於此同棲止始信壺中別有天示靈虛虛而靈寂而照動靜施為有玄要觸著金風徹骨涼捧爐神卻翻茶銚示眾桑陰盤曲路無石雨後往來看腳下擬議之時跌一交莫道隱川苔地滑雨中向日葵示梵為越出群芳不二天狂風妒雨一心懸任從日處重雲內自向東西義莫遷種田退步由來是上前低頭覷破水中天忽然插到退不去撒手翻身跳上巔隱川即事本自無心於富貴清香滿院掃難開白雲澹泞天空碧燈盞無油明月來道人到此且開懷今日無糧又有齋鄰過筍籩穿曲徑鳥啣紅柿落霜階示照先兩度追隨入蠡湖不離家舍在中途於今直示還鄉去繡雪香芬莫負孤示舜日杲法孫舊案新翻喜有源急須戮力報師恩老僧親勘無憂矣眉目分明嫡骨孫示寶如玉法孫末季陵風孰仔肩瓦瓢盛雪煮青天春來又見兒孫事一樹寒梅映水邊住敬畏庵示眾慧命懸絲入隱川那期舊話又新圓兒孫殃及重拈出夜半優曇火裏鮮曉窗即事書為羅子後又先叔姪依依嫩綠雨初晴兀坐曉窗鳥語清且喜蘭馨真實境道人風味不虛聲示周蓮齋居士遠過隱川法名真潔溈山泥壁我打牆此事如何作較量相見別無閒話會拋槌歸院點蒿湯示羅居士捨地重脩建祖塔二首祖塔穢污深可悲者回不用問鑽龜個中血脈無多子嫡骨兒孫更有誰買地葬人非分外孫承祖業豈胡猜道人有地不須買掘個深坑便好埋留文允言居士度夏丁未毒暑飛蒸孰可逃惟君與竹卻相饒廬山舊面分明現來向凄凄破寂寥示休巖壁法孫沿流不斷要分明卓出重函貴眼清欲報汝師恩怨處急須努力振家聲示耕十頌并引余嘗示耕此題立來已久尚未拈出恐多事耳今有某某從侍殷勤特以祖業為問余但微笑某乃至再因出頌示之彼且不嫌荒鄙隨即賡和洵知時節因緣良有待也舉似大方獅子吼野干鳴請試簡看未耕寥寥祖業不多爭纔見田園蓁莽生契券幸然明號段惟人努力起家聲開荒鈍钁橫拈入草叢那論朝夕苦施工荒丘若處都翻轉一曲高歌日已紅下種種子攜來絕妄傳好平因地下機先但能不失農時候自有靈苗透水田灌水一莂根苗慎勿枯時將惡水長榮株縱教垂實還須潤未審農人會也無耘草異卉靈苗一處陳拈來須要別疏親更加耘到無耘處野色青青滿眼新刈實試看良田稻正香及時收拾好秋光鐮刀拈起從頭刈風捲煙霞墜地黃登場風清月白滿肩挑大擔收來路不遙一總上堆隨日選好留佳種接豐饒篩颺曾將敲落積山中淨穀還須入磨礱無數糠秕傾颺盡重篩白米奉姑翁上倉驗盡精梁收上倉顆顆圓淨此中藏老儂印記重叮囑珍重吾家克肖郎賑濟忽憐飢餒苦何求豈吝家私不我憂一自打開無底藏人人飽足我方休和普明牧牛頌未牧昂然頭角日咆哮逐色隨聲路轉遙無限春光渾不覺何論觸處犯佳苗初調狹路相逢驀鼻穿繩頭緊把猛加鞭一回入草一回拽那許從前野性牽受制一經苦制息橫馳且把鞭繩款款隨縱使綠楊溪上臥眼瞠瞠地豈能疲回首忽然識得便回頭鞭影無加性自柔漫道牧童為易事手中繩子放還留馴伏隨順從教這那邊逢源左右得安然試看步步春風裏不費纖毫腕力牽無礙人牛坐臥總如如芳草坡中轉不拘綠樹陰濃新雨後數聲短笛樂餘餘任運鞭繩撇下白雲中踏斷山丘草正茸幾度煙巒情未已夕陽歸罷興還濃相忘調餘無事沒偏中那更有心分異同誰道潘郎多快便倒騎驢背過橋東獨炤牛兒已喪赤身閒懶說枯椿天地間嘯月吟風雖足快還須更透一層關雙泯合水和泥絕影蹤孤城山寺日當空應知個裏真端的幽鳥一聲花滿叢和宋天封佛慈禪師蜜蜂頌有序予庚寅春移梅次掘深土得斷碑半截洗閱蝌額有天封佛慈禪師法語八字下勒示語一篇并蜜蜂頌五首款識紹興已未長至日華頂支離叟書遺祖照顏侍者予乃恍然曰此地五百年前事彌露矣即置之法堂及稽燈傳佛慈為圜悟嗣又考真歇了塔銘了曾祖照會中首眾洵知二老出世開法金明非小緣也適子穀蔡居士覷見力請表揚因述緣起并勉賡和順治乙未春悟進識附原頌千花蕊上刺香時百草頭邊得意歸一竅透穿通活路遊絲無礙去來飛風光占盡作生涯鬧合門前趁晚衙君看不期而自信兒孫整整世其家桶底遭君打脫時從前活計頓拋離超然不戀舊窠窟空有層層釀蜜脾平生底事付風光日暖花開個個忙𡎺著等閑遭一劄痛連心髓要承當老閉刳桐向上仝參一竅通禪者不須窺戶牖針鋒劄著面皮紅類墮風光妙密機紛紛鬧裏帶香歸百千慧命同心接不令而行翼翼飛同門出入各天涯縱在途中不離衙滿徑芳菲皆活計翩然落草問君家驚天動地出窠時義斷恩忘永別離從此門庭雖各立同風千里蜜生脾朝朝鼓翅弄晴光拭露穿雲花底忙劈面相逢無避處一錐腦後痛心當從緣入得這空桐透過窗櫺處處通豐儉隨家同受用江南三月落花紅再和豁開戶牖蚤春時覓得些些悄地歸試看當軒人跡斷高吟一曲百花飛沒生涯處忽生涯出內翻飛聲震衙就裏分明賓主定何勞更問我王家綿密針鋒點點時恣探花落影離離從教鐵面銅睛漢觸著渾驚毒入脾春來若處逞風光豈似花間蝶戀忙奕世兒孫承大蔭酬恩須要自擔當個裏藏鋒妙古桐和光出入絕相通盡知釀蜜成家業不覺芳菲滿逕紅三和百萬英靈簇擁時獨拈花髓幾知歸頭陀不禁輕遭劄惱亂叢林千古飛光生漆桶足生涯日暖花香大放衙挨羽去來成底事孰知福國裕民家正值移梅春仲時钁頭邊遇老支離盤桓徹底針鋒露句句希聲暢蜜脾兩股花呈種種光回途不是等閒忙密移一步傾籌室未許傍觀胡亂當纔揚眉目倩疏桐不壞色香竅自通萬丈華峰留不住卻來檇李刺新紅
